          {id:'chemicka-vazba',title:'Chemická vazba',
            content:'<h3>📖 Chemická vazba</h3><p>Chemická vazba vzniká působením elektrostatických sil mezi atomy. Cílem je dosažení stabilní elektronové konfigurace (pravidlo oktetu – 8 valenčních elektronů).</p><p><strong>Iontová vazba:</strong> přechod elektronů mezi kovy a nekovy (Na⁺Cl⁻). Vzniká krystalická mřížka. <strong>Kovalentní vazba:</strong> sdílení elektronů mezi nekovy (H₂, O₂, H₂O). Podle polarity: nepolární (stejná elektronegativita), polární (různá). <strong>Kovová vazba:</strong> valenční elektrony jsou delokalizovány – tvoří elektronový plyn.</p><p><strong>Elektronegativita (EN):</strong> schopnost atomu přitahovat elektrony. Paulingova stupnice. Rozdíl EN určuje typ vazby: <0,4 nepolární, 0,4–1,7 polární, >1,7 iontová.</p>',
            quiz:[
              {q:'V iontové vazbě elektrony:',a:'Přecházejí z kovu na nekov',b:'Jsou sdíleny',c:'Jsou volné',d:'Nereagují'},
              {q:'Kovalentní vazba vzniká:',a:'Sdílením elektronů',b:'Předáním elektronů',c:'Elektronovým plynem',d:'Kovovou vazbou'},
              {q:'Elektronegativita je schopnost:',a:'Přitahovat elektrony',b:'Předávat elektrony',c:'Tvořit ionty',d:'Rozpouštět se'},
              {q:'Nepolární kovalentní vazba má ΔEN:',a:'<0,4',b:'0,4–1,7',c:'>1,7',d:'>3,0'},
              {q:'Vodíkový můstek patří mezi:',a:'Slabé vazby',b:'Iontové vazby',c:'Kovalentní vazby',d:'Kovové vazby'}

          {id:'chemicke-reakce',title:'Chemické reakce',
            content:'<h3>📖 Chemické reakce</h3><p>Chemická reakce je děj, při kterém se výchozí látky (reaktanty) mění na produkty. Zákon zachování hmotnosti – hmotnost reaktantů = hmotnost produktů.</p><p><strong>Typy reakcí:</strong> skladné (A + B → AB), rozkladné (AB → A + B), substituční (AB + C → AC + B), podvojná záměna (AB + CD → AD + CB).</p><p><strong>Rychlost chemické reakce:</strong> závisí na teplotě, koncentraci, katalyzátoru, jemnosti, tlaku. Katalyzátor urychluje reakci, aniž by se sám spotřeboval.</p><p><strong>Chemická rovnováha:</strong> ΔH (reakční teplo) – exotermická (ΔH<0, teplo se uvolňuje), endotermická (ΔH>0, teplo se spotřebovává).</p>',
            quiz:[
              {q:'Zákon zachování hmotnosti:',a:'Hmotnost reaktantů = hmotnost produktů',b:'Hmotnost reaktantů = 0',c:'Hmotnost se ztrácí',d:'Hmotnost se zdvojnásobí'},
              {q:'Katalyzátor:',a:'Urychluje reakci',b:'Zpomaluje reakci',c:'Spotřebovává se',d:'Mění produkt'},
              {q:'Exotermická reakce:',a:'Uvolňuje teplo (ΔH<0)',b:'Spotřebovává teplo (ΔH>0)',c:'Nemění teplotu',d:'Absorbuje světlo'},
              {q:'Rozkladná reakce:',a:'AB → A + B',b:'A + B → AB',c:'AB + C → AC + B',d:'AB + CD → AD + CB'},
              {q:'Rychlost reakce nezávisí na:',a:'Barvě látky',b:'Teplotě',c:'Koncentraci',d:'Katalyzátoru'}
            ]},
          {id:'periodicka-soustava-prvku',title:'Periodická soustava prvků',
            content:'<h3>📖 Periodická soustava prvků</h3><p>Periodickou tabulku prvků sestavil <strong>Dmitrij Mendělejev</strong> (1869). Prvky jsou seřazeny podle rostoucího protonového čísla. Sloupce = <strong>skupiny</strong> (stejný počet valenčních elektronů). Řádky = <strong>periody</strong> (stejný počet slupek).</p><p><strong>Skupiny:</strong> 1. alkalické kovy (Li, Na, K), 2. kovy alkalických zemin (Mg, Ca), 17. halogeny (F, Cl, Br, I), 18. vzácné plyny (He, Ne, Ar). Přechodné kovy ve skupinách 3–12.</p><p><strong>Periodicita vlastností:</strong> elektronegativita roste v periodě zleva doprava a ve skupině zdola nahoru. Atomový poloměr klesá v periodě a roste ve skupině. Ionizační energie, afinita k elektronu.</p>',
            quiz:[
              {q:'Periodickou tabulku sestavil:',a:'Mendělejev',b:'Dalton',c:'Bohr',d:'Lavoisier'},
              {q:'Skupina =',a:'Sloupec',b:'Řádek',c:'Perioda',d:'Blok'},
              {q:'Halogeny jsou ve skupině:',a:'17',b:'1',c:'2',d:'18'},
              {q:'Vzácné plyny jsou ve skupině:',a:'18',b:'17',c:'1',d:'8'},
              {q:'Elektronegativita roste:',a:'V periodě zleva doprava',b:'V periodě zprava doleva',c:'Ve skupině nahoru',d:'Nepravidelně'}
            ]}
        ]},

          {id:'anorganicka-chemie-vodik-kyslik',title:'Anorganická chemie – vodík a kyslík',
            content:'<h3>📖 Vodík a kyslík</h3><p><strong>Vodík H</strong> – nejjednodušší prvek, 1 proton, 1 elektron. Bezbarvý plyn, lehčí než vzduch. V přírodě ve sloučeninách (voda H₂O, organické látky). Výroba: elektrolýzou vody, reakcí kovů s kyselinami. Reakce: 2H₂ + O₂ → 2H₂O (výbušná směs – třaskavý plyn).</p><p><strong>Kyslík O</strong> – biogenní prvek, 8 protonů. Bezbarvý plyn, 21 % objemu vzduchu. Výroba: frakční destilace zkapalněného vzduchu, elektrolýza vody. <strong>Spalování:</strong> oxidační reakce za uvolnění tepla a světla. <strong>Oxidy:</strong> sloučeniny kyslíku s jiným prvkem (CO₂, SO₂, Fe₂O₃, H₂O).</p><p><strong>Ozón O₃</strong> – alotropická modifikace kyslíku, ochranná vrstva v atmosféře (10–50 km). Poškozování freony.</p>',

          {id:'anorganicka-chemie-halogeny',title:'Anorganická chemie – halogeny',
            content:'<h3>📖 Halogeny</h3><p>Halogeny jsou prvky 17. skupiny: fluor F, chlor Cl, brom Br, jod I, astat At. Mají 7 valenčních elektronů, silně elektronegativní. Tvoří dvouatomové molekuly F₂, Cl₂, Br₂, I₂ (I₂ pevný, Br₂ kapalný, F₂ a Cl₂ plynné).</p><p><strong>Chlor Cl₂</strong> – zelenožlutý jedovatý plyn. Výroba elektrolýzou NaCl. Použití: dezinfekce vody, výroba PVC, bělidel. Reakce: Cl₂ + 2Na → 2NaCl. <strong>Kyselina chlorovodíková HCl</strong> – silná kyselina, součást žaludečních šťáv.</p><p><strong>Fluor F₂</strong> – nejreaktivnější prvek, leptá sklo. <strong>Brom Br₂</strong> – červenohnědá kapalina. <strong>Jod I₂</strong> – dezinfekce, nezbytný pro štítnou žlázu. <strong>Halogenidy</strong> – soli halogenů s kovy: NaCl, KCl, CaF₂.</p>',

          {id:'anorganicka-chemie-kovy',title:'Anorganická chemie – kovy',
            content:'<h3>📖 Kovy</h3><p>Kovy zaujímají levou a střední část periodické tabulky. Typické vlastnosti: kovový lesk, vodivost (tepelná i elektrická), kujnost, tažnost. V chemických reakcích se chovají jako redukční činidla (odtrhávají elektrony).</p><p><strong>Alkalické kovy (Li, Na, K):</strong> velmi reaktivní, reagují i s vodou za vzniku hydroxidu a vodíku: 2Na + 2H₂O → 2NaOH + H₂. Uchovávají se pod petrolejem.</p><p><strong>Kovy alkalických zemin (Mg, Ca):</strong> méně reaktivní. Hořčík hoří oslepujícím bílým plamenem, vápník je součástí kostí a zubů.</p><p><strong>Přechodné kovy (Fe, Cu, Zn, Ag, Au):</strong> Fe – ocel, Cu – elektrické vodiče, Zn – galvanizace, Au a Ag – klenotnictví. Koroze – oxidace kovů (např. rez železa: Fe₂O₃·xH₂O).</p>',

          {id:'nazvoslovi-anorganickych-sloucenin',title:'Názvosloví anorganických sloučenin',
            content:'<h3>📖 Názvosloví anorganických sloučenin</h3><p>Anorganické názvosloví se řídí pravidly IUPAC.</p><p><strong>Oxidy:</strong> kyslíkaté sloučeniny. Názvy: oxid + název prvku + římská číslice oxidačního čísla: CO₂ = oxid uhličitý (C⁴⁺), Fe₂O₃ = oxid železitý (Fe³⁺).</p><p><strong>Hydroxidy:</strong> M(OH)ₓ. Názvy: hydroxid + název prvku + číslice: NaOH = hydroxid sodný, Ca(OH)₂ = hydroxid vápenatý.</p><p><strong>Kyseliny:</strong> bezkyslíkaté: H₂S = sulfan, HCl = chlorovodík/ kyselina chlorovodíková. Kyslíkaté: kyselina + název + koncovka podle oxidačního čísla (−ičná, −ičitá, −ová, −istá, −itá, −ný). H₂SO₄ = kyselina sírová, HNO₃ = dusičná, H₂CO₃ = uhličitá.</p><p><strong>Soli:</strong> názvy podle kyseliny a kovu. NaCl = chlorid sodný, CaCO₃ = uhličitan vápenatý, FeSO₄ = síran železnatý.</p>',

        topics:[
          {id:'organicka-chemie-uhlovodiky',title:'Organická chemie – uhlovodíky',
            content:'<h3>📖 Uhlovodíky</h3><p>Organická chemie studuje sloučeniny uhlíku (kromě CO, CO₂, uhličitanů). Uhlík se váže 4 vazbami a tvoří dlouhé řetězce. <strong>Nasycené X nenasycené:</strong> jednoduché vs násobné vazby.</p><p><strong>Alkany – CₙH₂ₙ₊₂:</strong> jednoduché vazby. CH₄ metan, C₂H₆ ethan, C₃H₈ propan, C₄H₁₀ butan. Reakce: hoření (CH₄+2O₂→CO₂+2H₂O), substituce (s halogeny).</p><p><strong>Alkeny – CₙH₂ₙ:</strong> dvojná vazba. C₂H₄ ethen, C₃H₆ propen. Reakce: adice (připojení na dvojnou vazbu). <strong>Alkyny – CₙH₂ₙ₋₂:</strong> trojná vazba. C₂H₂ ethyn (acetylen).</p><p><strong>Cykloalkany:</strong> uzavřené řetězce (cyklopropan, cyklohexan). <strong>Aromatické uhlovodíky:</strong> benzen C₆H₆ (delokalizované elektrony, stabilní). Deriváty: toluen, fenol, naftalen.</p>',

          {id:'organicka-chemie-derivaty',title:'Organická chemie – deriváty uhlovodíků',
            content:'<h3>📖 Deriváty uhlovodíků</h3><p>Deriváty vznikají nahrazením atomu/ů vodíku jinou funkční skupinou.</p><p><strong>Halogenové deriváty:</strong> R−X (X = F, Cl, Br, I). CHCl₃ chloroform, CCl₄, freony.</p><p><strong>Alkoholy:</strong> R−OH. CH₃OH methanol, C₂H₅OH ethanol (fermentace cukrů), glycerol (3 OH skupiny). Reakce: oxidace na aldehydy/kyseliny. <strong>Fenoly:</strong> OH vázaný na aromatické jádro.</p><p><strong>Aldehydy a ketony:</strong> R−CHO (formaldehyd, acetaldehyd), R−CO−R (aceton = propanon). <strong>Karboxylové kyseliny:</strong> R−COOH. Kyselina mravenčí HCOOH, octová CH₃COOH, citronová, mléčná.</p><p><strong>Estery:</strong> R−COO−R\'. Vznik esterifikací. Tvoří vůně a chutě. <strong>Aminy:</strong> R−NH₂ (báze). <strong>Amidy:</strong> R−CO−NH₂.</p>',

          {id:'organicka-chemie-isomery',title:'Organická chemie – isomery',
            content:'<h3>📖 Isomerie</h3><p>Isomery sloučeniny se stejným sumárním vzorcem, ale různým uspořádáním atomů.</p><p><strong>Konstituční isomery:</strong> liší se pořadím vazeb. Butan C₄H₁₀ má dva isomery: n-butan (přímý řetězec) a isobutan (větvený). Pentan C₅H₁₂ má 3 isomery. Rozdílné fyzikální vlastnosti (body varu).</p><p><strong>Stereoisomerie:</strong> stejné pořadí vazeb, různé prostorové uspořádání. <strong>Geometrická (cis-trans):</strong> u alkenů – cis (stejná strana) a trans (protilehlá). <strong>Optická (chiralita):</strong> molekuly jako zrcadlové obrazy – enantiomery. Asymetrický uhlík (4 různé skupiny). Otáčejí rovinu polarizovaného světla.</p>',
            quiz:[

          {id:'reakce-organicke-chemie',title:'Reakce v organické chemii',
            content:'<h3>📖 Reakce v organické chemii</h3><p>Organické reakce se dělí podle mechanismu a typu štěpení vazeb.</p><p><strong>Substituce (S):</strong> atom/skupina nahrazena jinou. Typické pro alkany: CH₄ + Cl₂ → CH₃Cl + HCl. <strong>Adice (A):</strong> připojení na násobnou vazbu. Typické pro alkeny/alkyny: C₂H₄ + Br₂ → C₂H₄Br₂. <strong>Eliminace (E):</strong> odštěpení molekuly. Opačný děj k adici.</p><p><strong>Oxidace a redukce:</strong> alkohol → aldehyd → karboxylová kyselina. <strong>Esterifikace:</strong> alkohol + karboxylová kyselina → ester + H₂O. <strong>Hydrolýza:</strong> štěpení vodou (esterů, amidů). <strong>Polymerace:</strong> spojení monomerů v makromolekulu (polyethylen, PVC, polystyren).</p><p><strong>Karbonylové sloučeniny:</strong> adice nukleofilu na karbonylovou skupinu C=O.</p>',

          {id:'biochemie-bilkoviny-lipidy',title:'Biochemie – bílkoviny a lipidy',
            content:'<h3>📖 Bílkoviny a lipidy</h3><p><strong>Bílkoviny (proteiny)</strong> jsou polymery aminokyselin. Základní aminokyselinový monomer: NH₂−CHR−COOH. Peptidová vazba −CO−NH− spojuje aminokyseliny. 20 proteinogenních aminokyselin. Struktura bílkovin: primární (pořadí AK), sekundární (α-helix, β-sheet), terciární (prostorové uspořádání), kvartérní (více podjednotek). Enzymy – biologické katalyzátory.</p><p><strong>Lipidy</strong> – hydrofobní látky. Dělí se na jednoduché (tuky a vosky) a složené (fosfolipidy, glykolipidy). <strong>Tuky:</strong> triacylglyceroly – glycerol + 3 mastné kyseliny. Nasycené (tuhé, živočišné) × nenasycené (kapalné, rostlinné oleje). <strong>Fosfolipidy:</strong> stavební složka buněčných membrán (dvojvrstva). Cholesterol – steroid, součást membrán, prekurzor hormonů.</p>',
            quiz:[
              {q:'Bílkoviny jsou polymery:',a:'Aminokyselin',b:'Sacharidů',c:'Nukleotidů',d:'Mastných kyselin'},
              {q:'Peptidová vazba:',a:'−CO−NH−',b:'−C−C−',c:'−CH₂−',d:'−S−S−'},
              {q:'Triacylglyceroly jsou:',a:'Tuky',b:'Bílkoviny',c:'Sacharidy',d:'Nukleové kyseliny'},
              {q:'Fosfolipidy tvoří:',a:'Buněčné membrány',b:'DNA',c:'Enzymy',d:'Hormony'},
              {q:'Nasycené tuky jsou:',a:'Tuhé (živočišné)',b:'Kapalné (rostlinné)',c:'Vždy rostlinné',d:'Rozpustné ve vodě'}
            ]},
          {id:'biochemie-nukleove-kyseliny',title:'Biochemie – nukleové kyseliny',
            content:'<h3>📖 Nukleové kyseliny</h3><p><strong>DNA</strong> (deoxyribonukleová kyselina) a <strong>RNA</strong> (ribonukleová kyselina) jsou nositelky genetické informace. Monomery: nukleotidy (fosfát + cukr + báze).</p><p><strong>DNA:</strong> dvojšroubovice (Watson a Crick 1953). Cukr = deoxyribóza. Báze: adenin (A), guanin (G), cytosin (C), thymin (T). A=T, G≡C (párování). Replikace – kopírování DNA před dělením buňky.</p><p><strong>RNA:</strong> jednovlákno, cukr = ribóza. Báze: A, G, C, uracil (U) místo T. Druhy: mRNA (mediátorová – přepis genu), tRNA (transferová – nosič AK), rRNA (ribozomální – součást ribozomu).</p><p><strong>Centrální dogma molekulární biologie:</strong> DNA → (transkripce) → RNA → (translace) → bílkovina. Genetický kód – trojice bází (kodon) = 1 aminokyselina.</p>',
            quiz:[
              {q:'Struktura DNA:',a:'Dvojšroubovice',b:'Jedno vlákno',c:'Čtyřšroubovice',d:'Kružnice'},

              {q:'Kdo objevil strukturu DNA?',a:'Watson a Crick',b:'Mendel',c:'Darwin',d:'Mendělejev'},
              {q:'Báze v RNA místo thyminu:',a:'Uracil',b:'Adenin',c:'Guanin',d:'Cytosin'},
              {q:'Translace je:',a:'Syntéza bílkoviny podle RNA',b:'Přepis DNA do RNA',c:'Kopírování DNA',d:'Oprava DNA'}

          {id:'chemie-v-praxi',title:'Chemie v praxi',
            content:'<h3>📖 Chemie v praxi</h3><p><strong>Průmysl:</strong> výroba kyseliny sírové (nejvyráběnější chemikálie), amoniaku (Haber-Bosch), dusíkatých hnojiv, plastů (polyethylen, polypropylen, PVC, polystyren).</p><p><strong>Farmaceutická chemie:</strong> vývoj a výroba léčiv – analgetika (Paralen, Ibuprofen), antibiotika (penicilin – objeven Flemingem 1928), antivirotika, vakcíny.</p><p><strong>Potravinářství:</strong> konzervanty, antioxidanty, barviva, sladidla, emulgátory. E-látky. <strong>Detergenty:</strong> mýdla, saponáty, tenzidy. <strong>Kosmetika:</strong> krémy, parfémy, make-up.</p><p><strong>Životní prostředí:</strong> znečištění (SO₂, NOₓ, CO₂, smog), skleníkový efekt, kyselé deště, ozonová díra, čištění odpadních vod, recyklace.</p>',

          {id:'obecna-biologie-cytologie',title:'Obecná biologie a cytologie',
            content:'<h3>📖 Obecná biologie a cytologie</h3><p>Biologie je věda o živé přírodě. Základní vlastnosti života: metabolismus, dráždivost, růst, rozmnožování, dědičnost, evoluce. Viry – nebuněčné organismy, rozmnožují se pouze v hostitelské buňce (DNA/RNA + bílkovinný obal). COVID-19, HIV, chřipka, neštovice.</p><p><strong>Soustavy organismů:</strong> prokaryota (bez jádra – bakterie), eukaryota (s jádrem – prvoci, houby, rostliny, živočichové). Taxonomické kategorie: říše → kmen → třída → řád → čeleď → rod → druh.</p><p>Mikroskop – základní nástroj biologie. Zvětšení, rozlišení. Světelný × elektronový mikroskop.</p>',

          {id:'bunka',title:'Buňka',
            content:'<h3>📖 Buňka</h3><p>Buňka je základní stavební a funkční jednotka organismů. Dělení: prokaryotická (bakterie) a eukaryotická (s pravým jádrem a organelami).</p><p><strong>Stavba eukaryotické buňky:</strong> buněčná membrána (fosfolipidová dvojvrstva – semipermeabilní), cytoplazma, jádro (DNA, jadérko, karyotéka), mitochondrie (energetické centrum – buněčné dýchání), endoplazmatické retikulum (drsné a hladké), Golgiho aparát (modifikace a balení bílkovin), lysozomy (trávení), ribozomy (syntéza bílkovin).</p><p><strong>Rostlinná buňka:</strong> navíc buněčná stěna (celulóza), chloroplasty (fotosyntéza), vakuola (zásobní a odpadní).</p><p><strong>Buněčné dělení:</strong> mitóza (dělení jádra – vznik 2 dceřiných buněk), meióza (redukční dělení – vznik pohlavních buněk). Buněčný cyklus: G1 → S → G2 → mitóza.</p>',

          {id:'metabolismus-bunky',title:'Metabolismus buňky',
            content:'<h3>📖 Metabolismus buňky</h3><p>Metabolismus (přeměna látek a energie) se dělí na katabolismus (rozklad složitých látek s uvolněním energie) a anabolismus (výstavba složitých látek za spotřeby energie).</p><p><strong>Fotosyntéza:</strong> 6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂ (s využitím světelné energie, chloroplasty). Probíhá v chloroplastech rostlin. Světelná fáze (vznik ATP a NADPH) a temnostní fáze (Calvinův cyklus – fixace CO₂).</p><p><strong>Buněčné dýchání:</strong> C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + energie (ATP). Probíhá v mitochondriích. Fáze: glykolýza (cytosol), Krebsův cyklus, dýchací řetězec (ATP syntáza).</p><p><strong>Kvašení (fermentace):</strong> anaerobní proces – alkoholové (kvasinky → ethanol), mléčné (bakterie → kyselina mléčná).</p>',

          {id:'rozmnozovani-dedicnost',title:'Rozmnožování a dědičnost',
            content:'<h3>📖 Rozmnožování a dědičnost</h3><p><strong>Nepohlavní rozmnožování:</strong> mitóza, pučení, fragmentace, partenogeneze. Potomstvo je geneticky identické (klony). Pohlavní rozmnožování: spojení samčí a samičí pohlavní buňky (gamety) → zygota. Genetická variabilita.</p><p><strong>Mendelovy zákony dědičnosti:</strong> Gregor Mendel (1822–1884) – pokusy s hrachem. Mendelovy zákony: zákon uniformity (F₁), zákon segregace (štěpení v F₂ 3:1), zákon nezávislé kombinace. Alela – varianty genu. Dominantní × recesivní. Genotyp × fenotyp. Homozygot × heterozygot.</p><p><strong>Dědičnost člověka:</strong> autozomální (barvoslepost, hemofilie), gonozomální (vázáno na pohlaví). Genetické choroby – Downův syndrom (trizomie 21), cystická fibróza.</p>',

            content:'<h3>📖 Biologie člověka – orgánové soustavy</h3><p><strong>Opora a pohyb:</strong> kostra (kosti, chrupavky, vazy) – 206 kostí. Svalová soustava – hladké, příčně pruhované, srdeční svalstvo. Tělo: hlava, trup, končetiny. Osová kostra: lebka, páteř, hrudník.</p><p><strong>Oběhová soustava:</strong> srdce (4 dutiny – dvě síně a dvě komory), cévy (tepny, žíly, kapiláry), krev (červené krvinky – O₂, bílé krvinky – imunita, krevní destičky – srážlivost, plazma). Malý a velký krevní oběh. Krevní tlak, tep.</p><p><strong>Dýchací soustava:</strong> dutina nosní, hltan, hrtan, průdušnice, průdušky, plíce (alveoly – výměna plynů). Bránice.</p><p><strong>Trávicí soustava:</strong> dutina ústní (zuby, sliny), jícen, žaludek (HCl, pepsin), tenké střevo (trávení a vstřebávání), tlusté střevo (voda), konečník. Játra (žluč), slinivka (enzymy, inzulin).</p>',

          {id:'biologie-cloveka-smysly',title:'Biologie člověka – smysly',
            content:'<h3>📖 Smyslové orgány</h3><p><strong>Zrak:</strong> oko – rohovka, čočka, duhovka, sítnice (tyčinky – černobílé, čípky – barvy). Akomodace – zaostřování čočky. Vady: krátkozrakost (myopie), dalekozrakost (hypermetropie), astigmatismus, šedý zákal (katarakta).</p><p><strong>Sluch a rovnováha:</strong> ucho – vnější (boltec, zvukovod), střední (bubínek, kladívko, kovadlinka, třmínek), vnitřní (hlemýžď – vlastní sluch, tři polokruhovité kanálky – rovnováha).</p><p><strong>Chuť a čich:</strong> chuťové pohárky na jazyku (4+1 základních chutí: sladká, slaná, kyselá, hořká, umami). Čich – nosní sliznice s čichovými buňkami. <strong>Hmat:</strong> kůže – největší orgán (pokožka, škára, podkoží). Receptory tepla, chladu, tlaku, bolesti.</p>',

          {id:'biologie-cloveka-nervova-soustava',title:'Biologie člověka – nervová soustava',
            content:'<h3>📖 Nervová soustava</h3><p><strong>Neuron – základní jednotka:</strong> tělo, dendrity (příjem vzruchu), axon (vedení vzruchu), synapse (přenos vzruchu mezi neurony – neurotransmitery).</p><p><strong>Stavba NS:</strong> CNS – mozek (koncový – velký mozek, mezimozek, střední mozek, mozeček – rovnováha, Varolův most, prodloužená mícha – životní funkce) a mícha (páteř). Obvodová/periferní NS – nervy (mozkové a míšní), autonomní NS (sympatikus x parasympatikus).</p><p><strong>Funkce:</strong> reflexy (nepodmíněné – vrozené, podmíněné – získané), vyšší nervová činnost (myšlení, paměť, řeč, emoce, učení). Mozkové laloky: čelní (motorika, řeč – Brocovo centrum), temenní (cit), spánkový (sluch), týlní (zrak).</p>',

          {id:'zdravi-nemoc',title:'Zdraví a nemoc',
            content:'<h3>📖 Zdraví a nemoc</h3><p><strong>Imunitní systém:</strong> brání tělo před patogeny (viry, bakterie, parazity). Složky: bílé krvinky (lymfocyty B – protilátky, T – buňkami zprostředkovaná imunita), makrofágy, protilátky (imunoglobuliny). Nespecifická imunita (kůže, sliznice, zánět) × specifická (protilátky). Očkování (aktivní umělá imunita).</p><p><strong>Nemoc:</strong> infekční (virové – chřipka, HIV, COVID; bakteriální – angína, tuberkulóza; parazitární) × neinfekční (civilizační – cukrovka, obezita, kardiovaskulární, rakovina, alergie).</p><p><strong>Životní styl:</strong> zdravá strava, pohyb, spánek, hygiena, prevence. Návykové látky: alkohol, nikotin, drogy (marihuana, pervitin, heroin, kokain) – zdravotní a sociální rizika. Zásady první pomoci: resuscitace, zastavení krvácení, stabilizovaná poloha.</p>',

        topics:[
          {id:'zoologie-bezobratli',title:'Zoologie – bezobratlí',
            content:'<h3>📖 Zoologie – bezobratlí</h3><p>Bezobratlí tvoří 95 % živočišných druhů. Nemají vnitřní kostru (mohou mít vnější kostru – exoskelet u členovců).</p><p><strong>Kmeny:</strong> žahavci (medúzy, korály), ploštěnci (tasemnice), hlístice (roup), měkkýši (hlemýžď, škeble, chobotnice), kroužkovci (žížala, pijavice), členovci (nejpočetnější kmen – hmyz, pavouci, korýši, mnohonožky).</p><p><strong>Hmyz:</strong> tělo (hlava, hruď, zadeček), 3 páry nohou, křídla, tykadla. Proměna dokonalá (vajíčko → larva → kukla → dospělec – motýl, brouk) × nedokonalá (vajíčko → nymfa → dospělec – kobylka, vážka). Ekologický význam hmyzu: opylovači, rozkladači, škůdci.</p>',

          {id:'zoologie-obratlovci',title:'Zoologie – obratlovci',
            content:'<h3>📖 Zoologie – obratlovci</h3><p>Obratlovci mají vnitřní kostru s páteří. Dělí se na 5 tříd: ryby, obojživelníci, plazi, ptáci a savci.</p><p><strong>Ryby:</strong> vodní, žábry, ploutve, šupiny. Kapr, pstruh, losos. <strong>Obojživelníci:</strong> žijí ve vodě i na souši, dýchají kůží a plícemi, vývoj přes larvu (pulec). Žáby, čolci, mloci.</p><p><strong>Plazi:</strong> suchozemští, kožní šupiny, vejce na souši, studenokrevní. Ještěři, hadi, želvy, krokodýli. <strong>Ptáci:</strong> peří, křídla, teplokrevní, snášení vajec, let. Pěvci, dravci, sovy, vodní ptáci.</p><p><strong>Savci:</strong> srst, mléčné žlázy, teplokrevní, živorodí (kromě ptakořitných). Hlodavci, šelmy, kopytníci, primáti, kytovci, letouni. Člověk – Homo sapiens.</p>',

          {id:'botanika-nizsi-rostliny',title:'Botanika – nižší rostliny',
            content:'<h3>📖 Botanika – nižší rostliny</h3><p>Nižší rostliny (řasy) – nemají diferenciaci na kořen, stonek, list. Patří sem sinice (Cyanobacteria) a řasy (zelené, červené, hnědé). Probíhá u nich fotosyntéza. Žijí hlavně ve vodě.</p><p><strong>Mechorosty (Bryophyta):</strong> nejjednodušší suchozemské rostliny bez cévního systému. Měchýřky, rašeliník. Vlhká stanoviště. Gametofyt převládá nad sporofytem. Rozmnožování pomocí výtrusů (spor).</p><p><strong>Přesličky, plavuně, kapradiny:</strong> kapraďorosty. Cévní svazky (vodivé pletivo). Rozmnožování výtrusy. Kapraď samec, přeslička rolní. Vlhká stinná místa.</p>',

          {id:'botanika-vyssi-rostliny',title:'Botanika – vyšší rostliny',
            content:'<h3>📖 Botanika – vyšší rostliny</h3><p>Vyšší rostliny dělíme na nahosemenné a krytosemenné.</p><p><strong>Nahosemenné (Gymnospermae):</strong> semena nejsou ukryta v plodu. Jehličnany – smrk, borovice, jedle, modřín, borovice. Šišky. Stálezelené (kromě modřínu). Kůra, jehlice.</p><p><strong>Krytosemenné (Angiospermae):</strong> semena ukryta v plodu. Dělí se na dvouděložné (2 dělohy – listy se síťnatou žilnatinou, svazčitý kořen) a jednoděložné (1 děloha – listy se souběžnou žilnatinou).</p><p><strong>Stavba rostliny:</strong> kořen (kořenová soustava), stonek (lodyha, stvol, stéblo), list (čepel, řapík, žilnatina), květ (kalich, koruna, tyčinky, pestík), plod a semeno. Opylení, oplození, vznik plodu.</p><p>Fotosyntéza, dýchání, transpirace (vypařování vody).</p>',

        topics:[
          {id:'ekologie',title:'Ekologie',
            content:'<h3>📖 Ekologie</h3><p>Ekologie studuje vztahy organismů a jejich prostředí. <strong>Ekologické faktory:</strong> abiotické (teplota, světlo, voda, půda, vzduch) a biotické (vztahy mezi organismy – predace, parazitismus, konkurence, symbióza).</p><p><strong>Ekologická nika</strong> – souhrn všech faktorů, které organismus potřebuje k životu. <strong>Populace</strong> – skupina jedinců stejného druhu na určitém území. <strong>Společenstvo (biocenóza)</strong> – populace všech druhů na určitém území. <strong>Ekosystém</strong> – společenstvo + abiotické prostředí (les, rybník, louka).</p><p><strong>Potravní řetězec:</strong> producenti (zelené rostliny) → konzumenti 1. řádu (býložravci) → konzumenti 2. řádu (masožravci) → konzumenti 3. řádu → rozkladači (bakterie, houby). Tok energie a koloběh látek.</p>',

          {id:'genetika',title:'Genetika',
            content:'<h3>📖 Genetika</h3><p>Genetika studuje dědičnost a proměnlivost organismů. <strong>Gen</strong> – úsek DNA kódující bílkovinu. <strong>Alela</strong> – varianta genu. Genom – souhrn veškeré DNA v buňce. Lidský genom obsahuje asi 20 000–25 000 genů.</p><p><strong>Molekulární genetika:</strong> struktura DNA (dvojšroubovice), replikace (kopírování), transkripce (DNA→mRNA), translace (mRNA→bílkovina). Genetický kód – kodony (trojice bází) kódují aminokyseliny. 64 kodonů pro 20 aminokyselin + stop kodony.</p><p><strong>Mutace:</strong> změny v DNA – bodové (záměna báze), chromozomové (delece, inzerce, inverze, translokace), genomové (změna počtu chromozomů). Mutageny – faktory vyvolávající mutace (záření, chemikálie, viry). Geneticky modifikované organismy (GMO).</p>',

          {id:'evoluce',title:'Evoluce',
            content:'<h3>📖 Evoluce</h3><p>Evoluce (vývoj) organismů – proces změn v čase, který vedl k současné rozmanitosti života.</p><p><strong>Darwinova teorie přirozeného výběru:</strong> Charles Darwin (1809–1882) – cesta na lodi Beagle, Galapágy. Principy: variabilita (jedinci se liší), dědičnost (předávání znaků), přemnožení (více jedinců než zdrojů), selekce (přežívají nejlépe přizpůsobení). Fitness = míra reprodukčního úspěchu.</p><p><strong>Důkazy evoluce:</strong> fosilie (zkameněliny – paleontologie), srovnávací anatomie (homologické orgány – křídlo ptáka × předloktí člověka), embryologie (zárodečný vývoj), molekulární biologie (DNA). Evoluce člověka: Australopithecus → Homo habilis → Homo erectus → Homo sapiens.</p>',

            content:'<h3>📖 Ochrana životního prostředí</h3><p>Životní prostředí je vše, co nás obklopuje. Člověk ho ovlivňuje – pozitivně i negativně.</p><p><strong>Globální problémy:</strong> skleníkový efekt a globální oteplování (CO₂, CH₄), ozonová díra (freony), kyselé deště (SO₂, NOₓ), znečištění vody a ovzduší, odlesňování (tropické pralesy), vymírání druhů (biodiverzita), půdní eroze, odpad (plasty, mikroplasty).</p><p><strong>Ochrana přírody:</strong> národní parky (Šumava, Krkonoše, České Švýcarsko, Podyjí), CHKO (chráněné krajinné oblasti), Natura 2000, Červený seznam ohrožených druhů.</p><p><strong>Udržitelný rozvoj:</strong> uspokojení potřeb současné generace bez ohrožení generací budoucích. Recyklace, obnovitelné zdroje energie (solar, vítr, voda, biomasa, geotermál), úspora energií, snižování emisí, ekologické zemědělství.</p>',

          {id:'fyzicka-geografie-atmosfera-hydrosfera',title:'Fyzická geografie – atmosféra a hydrosféra',
            content:'<h3>📖 Atmosféra a hydrosféra</h3><p><strong>Atmosféra</strong> – vzdušný obal Země. Složení: N₂ 78 %, O₂ 21 %, Ar 0,9 %, CO₂ 0,04 %. Vrstvy: troposféra (0–12 km – počasí), stratosféra (ozónová vrstva), mezosféra, termosféra, exosféra. Počasí × podnebí (klima). Podnebné pásy: tropický, subtropický, mírný, subpolární, polární.</p><p><strong>Hydrosféra</strong> – vodní obal Země. 71 % povrchu. Oceány: Tichý (největší), Atlantský, Indický, Severní ledový. Slanost oceánů 35‰. Mořské proudy (Golfský proud – teplý, Labrador – studený). Pohyb vody: koloběh vody v přírodě.</p>',
            quiz:[
              {q:'Nejvíce zastoupený plyn v atmosféře:',a:'Dusík 78 %',b:'Kyslík 21 %',c:'Argon',d:'CO₂'},

              {q:'Golfský proud je:',a:'Teplý mořský proud',b:'Studený',c:'Mořský vítr',d:'Příliv'},
              {q:'Podnebí × počasí:',a:'Dlouhodobý průměr × aktuální',b:'Stejný význam',c:'Počasí je dlouhodobé',d:'Opak'}

          {id:'fyzicka-geografie-litosfera-pedosfera',title:'Fyzická geografie – litosféra a pedosféra',
            content:'<h3>📖 Litosféra a pedosféra</h3><p><strong>Litosféra</strong> – zemská kůra rozdělená na litosférické desky. Pohyb desek → zemětřesení, sopečná činnost, vznik pohoří (orogeneze). Desky: kontinentální × oceánská. Konvergentní (srážení), divergentní (rozházení), transformní (posun). Zemětřesení: epicentrum, hypocentrum, magnitudo (Richterova stupnice).</p><p><strong>Pedosféra</strong> – půdní obal Země. Půda vzniká zvětráváním hornin + činností organismů. Horizonty: A (ornice), B (podorničí), C (matečná hornina). Typy půd: černozem (nejúrodnější), hnědozem, podzol, rendzina. Faktory ovlivňující půdu: klima, matečná hornina, reliéf, organismy, čas, člověk.</p>',
            quiz:[
              {q:'Litosférické desky se pohybují:',a:'Několik cm/rok',b:'Několik m/rok',c:'Několik km/rok',d:'Nepohybují se'},
              {q:'Zemětřesení měříme:',a:'Richterovou stupnicí',b:'Celsiovou',c:'Fahrenheitovou',d:'Beaufortovou'},

              {q:'Konvergentní desky:',a:'Srážejí se',b:'Rozcházejí',c:'Posouvají',d:'Nepohybují'},
              {q:'Půdní horizont A je:',a:'Ornice',b:'Podorničí',c:'Matečná hornina',d:'Horní vrstva'}
            ]},
          {id:'kartografie',title:'Kartografie',
            content:'<h3>📖 Kartografie</h3><p>Kartografie je věda o tvorbě map. <strong>Mapa</strong> – zmenšený zobecněný obraz Země na rovině. Měřítko mapy – poměr zmenšení (1:10 000 – velké, 1:1 000 000 – malé). Druhy map podle obsahu: topografické, obecně zeměpisné, tématické (klimatické, politické, hospodářské).</p><p><strong>Zobrazení zemského povrchu:</strong> azimutální, kuželové, válcové (Mercatorovo zobrazení – zkreslení směru, použití v námořní navigaci). <strong>Zkreslení:</strong> délkové, plošné, úhlové. GPS (Global Positioning System) – určení polohy pomocí družic.</p><p><strong>Práce s mapou:</strong> vrstevnice (převýšení), legenda, souřadnice (zeměpisná šířka a délka), azimut. Kompas, GPS.</p>',
            quiz:[
              {q:'GPS je:',a:'Globální družicový polohový systém',b:'Typ mapy',c:'Měřítko',d:'Zobrazení'},
              {q:'Měřítko 1:10 000 je:',a:'Velké měřítko',b:'Malé měřítko',c:'Střední',d:'Nekonečné'},
              {q:'Mercatorovo zobrazení:',a:'Válcové, zkresluje plochy',b:'Azimutální',c:'Kuželové',d:'Bez zkreslení'},
              {q:'Vrstevnice spojují:',a:'Místa stejné nadmořské výšky',b:'Místa stejné teploty',c:'Místa stejného tlaku',d:'Cesty'},

            ]}

        title:'2. ročník',description:'Socioekonomická geografie – obyvatelstvo, sídla, hospodářství',
        topics:[
          {id:'socioekonomicka-geografie-obyvatelstvo',title:'Socioekonomická geografie – obyvatelstvo',
            content:'<h3>📖 Obyvatelstvo</h3><p>Svět má přes 8 miliard obyvatel (2024). Rozmístění nerovnoměrné – nejvíce v Asii (Čína, Indie). Hustota zalidnění: obyvatelé na km².</p><p><strong>Přirozený pohyb:</strong> porodnost (natalita), úmrtnost (mortalita). Přirozený přírůstek = porodnost − úmrtnost. Demografická revoluce (1. fáze: vysoká porodnost i úmrtnost → 2. fáze: vysoká porodnost, nízká úmrtnost → 3. fáze: nízká porodnost i úmrtnost).</p><p><strong>Migrace:</strong> vnitřní (venkov→město) a vnější (emigrace × imigrace). Příčiny: ekonomické, politické, náboženské, environmentální. Nelegální migrace, uprchlíci.</p><p><strong>Struktura obyvatelstva:</strong> věková (pyramida), vzdělanostní, náboženská, národnostní.</p>',
            quiz:[

              {q:'Nejlidnatější země:',a:'Čína a Indie',b:'USA a Rusko',c:'Brazílie a Nigérie',d:'Japonsko a Německo'},

          {id:'socioekonomicka-geografie-sidla',title:'Socioekonomická geografie – sídla',
            content:'<h3>📖 Sídla</h3><p>Sídla dělíme na venkovská (vesnice) a městská. Urbanizace – proces koncentrace obyvatel do měst. Dnes žije ve městech přes 55 % světové populace. Největší města: Tokio, Dillí, Šanghaj, São Paulo, Mexiko City.</p><p><strong>Funkce měst:</strong> správní, průmyslová, obchodní, kulturní, turistická, dopravní. <strong>Struktura města:</strong> historické jádro, centrum, předměstí, satelitní městečka. Suburbanizace – stěhování za město (satelitní výstavba). Mega-města (nad 10 mil. obyvatel).</p><p><strong>Venkov:</strong> zemědělské obce, menší hustota zalidnění. Vyliňování venkova (vyspělé země) × růst venkova (rozvojové země).</p>',

          {id:'svetove-hospodarstvi',title:'Světové hospodářství',
            content:'<h3>📖 Světové hospodářství</h3><p>Sektorová struktura hospodářství: primární (zemědělství, těžba), sekundární (průmysl, stavebnictví), terciární (služby), kvartérní (věda, výzkum, IT).</p><p><strong>Průmysl:</strong> energetika (uhlí, ropa, plyn, jaderná, obnovitelné), hutnictví (železo, ocel, hliník), strojírenství, chemický, automobilový, textilní, potravinářský. Průmyslová odvětví. Nejvyspělejší země: USA, Japonsko, Německo, Čína.</p><p><strong>Zemědělství:</strong> rostlinná výroba (obiloviny – pšenice, rýže, kukuřice), živočišná výroba (skot, prasata, drůbež). Samozásobitelské × tržní. Genotypově modifikované plodiny (GMO).</p><p><strong>Doprava:</strong> silniční, železniční, letecká, vodní, potrubní. Globalizace – nadnárodní korporace (Apple, Microsoft, Toyota, Shell).</p>',

          {id:'doprava-sluzby',title:'Doprava a služby',
            content:'<h3>📖 Doprava a služby</h3><p><strong>Doprava:</strong> nejrychleji rostoucí odvětví. Druhy: silniční (nejrozšířenější – flexibilní), železniční (hromadná, ekologická), letecká (nejrychlejší, nejdražší), vodní (nejlevnější, pomalá), potrubní (ropa, plyn). Letecká doprava – nejvytíženější letiště: Atlanta, Peking, Dubaj.</p><p><strong>Cestovní ruch (turismus):</strong> destinace: Francie (nejnavštěvovanější), Španělsko, USA, Itálie, Čína. Druhy: rekreační, poznávací, lázeňský, kongresový, sportovní.</p><p><strong>Služby:</strong> obchod (maloobchod, velkoobchod, e-commerce – Amazon, Alibaba), vzdělávání, zdravotnictví, bankovnictví, pojišťovnictví, telekomunikace. Rostoucí význam IT a digitálních služeb.</p>',

          {id:'regionalni-geografie-afrika-australie',title:'Regionální geografie – Afrika a Austrálie',

          {id:'regionalni-geografie-evropa',title:'Regionální geografie – Evropa',
            content:'<h3>📖 Evropa</h3><p>Rozloha 10,5 mil. km², cca 750 mil. obyvatel. Dělí se na západní, střední, jižní, severní a východní. Nejvyšší hora: Mont Blanc 4 807 m (Alpy). Alpsko-himálajská soustava. Nejdelší řeka: Volha 3 530 km.</p><p><strong>Západní Evropa:</strong> Francie (Mariany, Eiffelovka), Velká Británie (Londýn, Big Ben), Německo (Berlín, největší ekonomika EU), Benelux.</p><p><strong>Jižní Evropa:</strong> Itálie (Řím, Koloseum, Vatikán), Španělsko, Portugalsko, Řecko (Akropole, ostrovy). Středomořský ráz.</p><p><strong>Severní Evropa:</strong> Skandinávské země (Norsko, Švédsko, Finsko), Dánsko, Island. Fjordy, polární záře. Vysoká životní úroveň.</p><p><strong>Evropská unie:</strong> 27 států (k 2024). Euro – měna 20 zemí. Schengenský prostor – volný pohyb osob.</p>',

            content:'<h3>📖 Číselné soustavy</h3><p>Číselné soustavy jsou způsoby zápisu čísel. V mikroprocesorové technice jsou nejdůležitější dvojková (binární), osmičková (oktalová) a šestnáctková (hexadecimální).</p><p><strong>Dvojková soustava (binární):</strong> základ 2, číslice 0 a 1. Každá pozice představuje mocninu 2: …2³, 2², 2¹, 2⁰. Příklad: 1011₂ = 1·8+0·4+1·2+1·1 = 11₁₀. V mikroprocesorech se informace ukládá jako bity (0/1) a byty (8 bitů).</p><p><strong>Šestnáctková soustava (hexadecimální):</strong> základ 16, číslice 0–9 a A–F (A=10, B=11, …, F=15). Příklad: 1A3₁₆ = 1·256+10·16+3 = 419₁₀. Převod mezi binární a hex: každé 4 bity = 1 hex číslice.</p><p>BCD kód (Binary Coded Decimal) – každá desítková číslice je zakódována 4 bity.</p>',

          {id:'instrukcni-soubor',title:'Instrukční soubor',

          {id:'citace-casovace',title:'Čítače a časovače',
            content:'<h3>📖 Čítače a časovače 8051</h3><p>8051 obsahuje dva 16bitové čítače/časovače (Timer 0 a Timer 1). Každý lze použít jako časovač (vnitřní hodiny) nebo čítač (vnější události).</p><p><strong>Režimy (TMOD registr):</strong> Mód 0 – 13bitový čítač, Mód 1 – 16bitový, Mód 2 – 8bitový s auto-reload, Mód 3 – rozdělení Timer 0 na dva 8bitové. Nastavení: C/T bit = 0 (časovač), = 1 (čítač).</p><p><strong>Časovač:</strong> inkrementuje každý strojní cyklus (1/12 krystalu). Při 12 MHz: 1 tick = 1 µs. Při přetečení (z FFFFh na 0000h) se nastaví TF0/TF1 flag v TCON – může vyvolat přerušení.</p><p><strong>Počáteční nastavení:</strong> THx a TLx registry. Výpočet: počáteční hodnota = 65536 − požadovaný počet ticků. Pro přesné časování se používá Mód 2 (auto-reload).</p>',
            quiz:[
              {q:'Timer 0 je:',a:'16bitový čítač/časovač',b:'8bitový registr',c:'32bitový čítač',d:'Sériový port'},
              {q:'C/T bit = 0 znamená:',a:'Režim časovače',b:'Režim čítače',c:'Mód 0',d:'Mód 1'},
              {q:'Při 12 MHz je 1 strojní cyklus:',a:'1 µs',b:'12 µs',c:'1 ms',d:'1 s'},
              {q:'TF0 flag indikuje:',a:'Přetečení Timer 0',b:'Přijatý byte',c:'Vnější přerušení',d:'Konec programu'},

          {id:'seriova-komunikace',title:'Sériová komunikace',
            content:'<h3>📖 Sériová komunikace 8051</h3><p>8051 má vestavěný UART (Universal Asynchronous Receiver Transmitter) pro sériovou komunikaci.</p><p><strong>Režimy (SCON registr):</strong> Mód 0 – synchronní posuvný registr, Mód 1 – 8bitový UART s proměnnou rychlostí, Mód 2 – 9bitový s pevnou rychlostí, Mód 3 – 9bitový s proměnnou rychlostí.</p><p><strong>Baud rate (přenosová rychlost):</strong> pro Mód 1 a 3 se odvozuje z Timer 1 (nebo Timer 2 u 8052). Vzorec: baud = (2^SMOD)/32 · fosc/(12·(256−TH1)). SMOD bit v PCON registru. Běžné hodnoty: 9600, 19200, 115200 Bd.</p><p><strong>Komunikační protokol:</strong> start bit (0), 8 dat bitů (LSB first), volitelný paritní bit, stop bit (1). Příjem i vysílání jsou bufferovány (SBUF registr). RI (Receive Interrupt) a TI (Transmit Interrupt) flagy v SCON.</p>',
            quiz:[
              {q:'UART slouží k:',a:'Sériové komunikaci',b:'Paralelní komunikaci',c:'Časování',d:'Přerušení'},
              {q:'SBUF registr:',a:'Data buffer pro sériový port',b:'Řídicí registr',c:'Timer registr',d:'Příznakový registr'},
              {q:'Start bit v asynchronní komunikaci:',a:'Logická 0',b:'Logická 1',c:'Paritní bit',d:'Stop bit'},
              {q:'RI flag:',a:'Příjem dat dokončen',b:'Odeslání dokončeno',c:'Chyba komunikace',d:'Buffet plný'},
              {q:'Baud rate:',a:'Rychlost přenosu v bitech/s',b:'Počet datových bitů',c:'Frekvence hodin',d':'Napájecí napětí'}
            ]},
          {id:'prace-s-porty',title:'Práce s porty',
            content:'<h3>📖 Práce s porty 8051</h3><p>8051 má 4 paralelní I/O porty: P0, P1, P2, P3. Každý je 8bitový (8 pinů). Porty jsou obousměrné – lze je nastavit jako vstup nebo výstup.</p><p><strong>Výstup:</strong> zápis do portu (MOV P1, #0FFh – všechny piny = 1). Piny P0 a P2 vyžadují pull-up odpory při výstupu. Port 3 má multiplexované funkce (INT0, INT1, T0, T1, RD, WR, RXD, TXD).</p><p><strong>Vstup:</strong> před čtením je nutné zapsat 1 do portu (nastavení do high-impedance stavu). Poté lze číst (MOV A, P1).</p><p><strong>Bitové operace:</strong> SETB P1.0 (nastav bit na 1), CLR P1.0 (vynuluj), CPL P1.0 (neguj), JB P1.0, adresa (skok pokud bit = 1), JNB P1.0, adresa (skok pokud = 0).</p><p><strong>Praktické příklady:</strong> rozsvícení LED, čtení tlačítka, ovládání relé, komunikace s displejem.</p>',
            quiz:[

        topics:[
          {id:'7segmentovy-displej',title:'7segmentový displej',
            content:'<h3>📖 7segmentový displej</h3><p>7segmentový displej obsahuje 7 LED segmentů (a–g) + tečka (dp), uspořádaných do tvaru osmičky. Každý segment je samostatně ovládán.</p><p><strong>Zapojení:</strong> společná anoda (společný +5V, segmenty se rozsvítí log. 0) × společná katoda (společný GND, rozsvítí log. 1). Segmenty se ovládají přes porty 8051 přes rezistory (220–330 Ω).</p><p><strong>Kód číslic:</strong> např. pro číslici 0: segmenty a,b,c,d,e,f = 1, g = 0 → binárně 00111111 (pro společnou katodu). Číslice 1: b,c = 1 → 00000110. Tabulka kódů (look-up table) v paměti programu.</p><p><strong>Více displejů – multiplexování:</strong> data pro všechny displeje jsou společná, postupně aktivujeme jednotlivé displeje (společné anody/katody). Lidské oko díky setrvačnosti vidí stabilní obraz (obnovovací frekvence > 50 Hz).</p>',
            quiz:[
              {q:'7segmentový displej má:',a:'7 segmentů + tečka',b:'7 segmentů',c:'8 segmentů',d:'6 segmentů'},
              {q:'Společná katoda:',a:'Rozsvítí se log. 1',b:'Rozsvítí se log. 0',c:'Sdílí anodu',d:'Nemá společnou'},

          {id:'lcd-displej',title:'LCD displej',
            content:'<h3>📖 LCD displej</h3><p>Nejčastěji používaný alfanumerický LCD displej je řady HD44780 (16×2 nebo 20×4 znaků). Komunikace přes 8bitovou nebo 4bitovou paralelní sběrnici.</p><p><strong>Piny LCD:</strong> VSS (GND), VDD (+5V), VEE (kontrast), RS (Register Select – 0=instrukce, 1=data), R/W (Read/Write), E (Enable – clock), D0–D7 (datové piny). Pro 4bitový režim stačí D4–D7.</p><p><strong>Inicializace:</strong> reset, nastavení režimu (8/4bit, počet řádků, font), vypnutí kurzoru, vymazání displeje. Posílání instrukcí: Function Set, Display ON/OFF, Entry Mode Set.</p><p><strong>Zápis znaku:</strong> RS=1, data ASCII hodnoty. Adresování DDRAM – první řádek adresy 00h–0Fh, druhý 40h–4Fh pro 16×2. Vlastní znaky – CGRAM (8 znaků 5×8 bodů).</p>',

          {id:'ad-da-prevodniky',title:'A/D a D/A převodníky',
            content:'<h3>📖 A/D a D/A převodníky</h3><p><strong>A/D převodník (ADC)</strong> – převádí analogový signál (napětí) na digitální hodnotu (binární číslo). Důležité parametry: rozlišení (8–16 bitů), vzorkovací frekvence, kvantovací krok.</p><p><strong>Typy ADC:</strong> komparační (flash) – nejrychlejší, 2ⁿ komparátorů. Postupná aproximace (SAR) – kompromis rychlost/přesnost. Dvojitá integrace (dual slope) – pomalá ale přesná. Sigma-delta – pro audio. Na čipu 8051 není ADC – připojuje se externě (ADC0804, ADC0809).</p><p><strong>D/A převodník (DAC)</strong> – převádí digitální hodnotu na analogové napětí. R-2R žebříček – nejjednodušší, síť rezistorů. Integrované DAC: DAC0808, MCP4921. Použití: generování signálů (sinus, pilový), audio výstup, řízení analogových obvodů.</p>',

              {q:'ADC převádí:',a:'Analog → digitál',b:'Digitál → analog',c:'Napětí → proud',d:'Proud → napětí'},

              {q:'Nejrychlejší typ ADC:',a:'Flash (komparační)',b:'SAR',c:'Dual slope',d:'Sigma-delta'},

            ]},
          {id:'pravidle-projekty',title:'Praktické projekty',
            content:'<h3>📖 Praktické projekty s 8051</h3><p>V praxi se s 8051 setkáte v embedded systémech. Zde jsou typické projekty pro procvičení.</p><p><strong>1. Blikání LED:</strong> Nejjednodušší projekt – rozsvěcení/zhasínání LED na portu pomocí časovače. Procvičení: nastavení portu, časovače, smyčky.</p><p><strong>2. Čítač s 7segmentovým displejem:</strong> Čtení tlačítka, čítání stisků, zobrazení hodnoty na displeji. Multiplexování více displejů.</p><p><strong>3. Měření teploty:</strong> ADC + teplotní čidlo (LM35, DS18B20). Zobrazení na LCD. Procvičení: ADC komunikace, přepočet napětí na teplotu, formátování výstupu.</p><p><strong>4. Generátor funkcí:</strong> DAC + výpočet sin, pily, obdélníku v programu. Výstupní frekvence nastavitelná tlačítky.</p><p><strong>5. Sériová komunikace s PC:</strong> Odesílání dat přes UART, příjem povelů. Jednoduchý terminál: LED ovládaná z PC, odezva na příkazy.</p>',

            content:'<h3>📖 Základní pojmy, elektrický proud a napětí</h3><p><strong>Elektrický náboj Q</strong> – základní veličina, jednotka C (coulomb). Elementární náboj e = 1,602·10⁻¹⁹ C. Náboj může být kladný (nedostatek e⁻) nebo záporný (přebytek e⁻).</p><p><strong>Elektrický proud I</strong> – usměrněný pohyb volných elektronů (kovy) nebo iontů (elektrolyty). I = Q/t, jednotka A (ampér). Směr proudu: dohodou od + k − (elektrony se pohybují opačně). Stejnosměrný (DC) × střídavý (AC).</p><p><strong>Elektrické napětí U</strong> – rozdíl potenciálů mezi dvěma body. Jednotka V (volt). Zdroje napětí: baterie (1,5V; 9V), akumulátory (12V), síť (230V).</p>',

          {id:'odpor-ohmuv-zakon',title:'Odpor a Ohmův zákon',
            content:'<h3>📖 Odpor a Ohmův zákon</h3><p><strong>Elektrický odpor R</strong> – vlastnost vodiče bránit průchodu proudu. Jednotka Ω (ohm). Značka ve schématech: obdélník / cik-cak čára. Ohmův zákon: I = U/R, nebo U = I·R, R = U/I.</p><p><strong>Závislost odporu na materiálu:</strong> R = ρ·l/S (ρ = měrný odpor / rezistivita, l = délka, S = průřez). Vliv teploty: R = R₀(1+α·Δt) pro vodiče (α>0 – s rostoucí teplotou roste odpor), pro polovodiče α<0.</p><p>Příklady ρ (Ω·mm²/m): měď 0,0178, hliník 0,0278, železo 0,1, zlato 0,023. Supravodivost – R=0 při velmi nízkých teplotách.</p>',

            content:'<h3>📖 Výkon a práce elektrického proudu</h3><p><strong>Elektrický výkon P</strong> – množství práce vykonané za jednotku času. P = U·I, jednotka W (watt). Další vztahy: P = I²·R, P = U²/R. Příkon × výkon, účinnost η = P_out/P_in · 100%.</p><p><strong>Práce elektrického proudu W</strong> – W = P·t = U·I·t, jednotka J (joule) nebo kWh (kilowatthodina). 1 kWh = 3,6 MJ. Příklady: 100W žárovka svítí 10h → W = 100·10 = 1000 Wh = 1 kWh.</p><p><strong>Jouleovo teplo:</strong> průchodem proudu vzniká teplo Q = I²·R·t (Jouleův zákon). Využití: topení, vařiče, žehličky. Ztrátový výkon na vedení: P_z = I²·R.</p>',

          {id:'zaklady-zapojeni-mereni',title:'Základy zapojení a měření',
            content:'<h3>📖 Základy zapojení a měření</h3><p><strong>Voltmetr:</strong> měří napětí, zapojuje se paralelně (ke spotřebiči). Vnitřní odpor voltmetru by měl být co největší. Značka: V v kroužku.</p><p><strong>Ampérmetr:</strong> měří proud, zapojuje se sériově (do obvodu). Vnitřní odpor by měl být co nejmenší. Značka: A v kroužku.</p><p><strong>Multimetr:</strong> kombinace voltmetru, ampérmetru a ohmmetru. Digitální (DMM) nebo analogový. Rozsahy měření, přesnost, vnitřní odpor.</p><p><strong>Zdroje:</strong> ideální zdroj napětí (U = konst, nezávisí na zátěži) × reálný (vnitřní odpor R_i). Svorkové napětí: U_sv = U₀ − I·R_i. Zkratový proud: I_k = U₀/R_i.</p>',

            content:'<h3>📖 Stejnosměrné obvody</h3><p>Stejnosměrný obvod (DC) se skládá ze zdroje napětí, spotřebičů (rezistorů) a vodičů. Proud teče jedním směrem.</p><p><strong>Sériové zapojení:</strong> proud všemi prvky stejný, napětí se sčítá. R_celk = R₁+R₂+...+Rₙ. U_celk = U₁+U₂+...+Uₙ. Dělič napětí: U₁ = U·R₁/(R₁+R₂).</p><p><strong>Paralelní zapojení:</strong> napětí na všech prvcích stejné, proud se sčítá. 1/R_celk = 1/R₁+1/R₂+...+1/Rₙ. Pro 2 rezistory: R_celk = R₁·R₂/(R₁+R₂). Dělič proudu: I₁ = I·R₂/(R₁+R₂).</p><p>Řešení obvodů: zjednodušování (sériové → paralelní kombinace), Theveniova věta (náhradní zdroj napětí), Nortonova věta (náhradní zdroj proudu).</p>',

          {id:'kirchhoffovy-zakony',title:'Kirchhoffovy zákony',

          {id:'stridavy-proud-elektro',title:'Střídavý proud',

            content:'<h3>📖 Operační zesilovač (OZ)</h3><p>Operační zesilovač je integrovaný obvod pro zpracování analogových signálů. Ideální OZ: nekonečné zesílení A, nekonečný vstupní odpor, nulový výstupní odpor, nekonečná šířka pásma.</p><p><strong>Vývody:</strong> neinvertující vstup (+), invertující vstup (−), výstup, napájení (+V_CC, −V_EE). Reálné OZ: LM741, LM358 (2 OZ v pouzdře), NE5532 (nízkošumový), LM324 (4 OZ).</p><p><strong>Základní zapojení:</strong><br>• Invertující zesilovač: A_u = −R₂/R₁ (záporné zesílení, fázový posuv 180°)<br>• Neinvertující zesilovač: A_u = 1 + R₂/R₁<br>• Napěťový sledovač (buffer): A_u = 1, vysoký vstupní odpor<br>• Komparátor: porovnává napětí na vstupech<br>• Integrátor: výstup = −1/(R·C)·∫u_vstup dt<br>• Diferenciátor: výstup = −R·C·du_vstup/dt</p><p><strong>Záporná zpětná vazba:</strong> stabilizuje zesílení, zvyšuje šířku pásma, snižuje zkreslení.</p>',

            content:'<h3>📖 Číslicová technika – TTL a CMOS</h3><p>Logické obvody se vyrábějí v různých technologiích. Nejpoužívanější: TTL (Transistor-Transistor Logic) a CMOS (Complementary Metal-Oxide-Semiconductor).</p><p><strong>TTL:</strong> 74xx řada (7400, 7404, 7432…). Napájení 5V. Logická 0 = 0–0,8V, logická 1 = 2–5V. Rychlé, ale vyšší spotřeba. Vstupy: proud do báze tranzistoru. Výstupy: totem-pole (push-pull) nebo otevřený kolektor.</p><p><strong>CMOS:</strong> 40xx řada (4001, 4011, 4071…) a 74HCxx (High-speed CMOS). Napájení 3–15V (40xx) nebo 2–6V (74HC). Logická 0 ≈ GND, logická 1 ≈ VDD. Velmi nízká spotřeba (pouze při přepínání). Vysoká vstupní impedance (gate MOSFETů). Dnes převládá CMOS (74HC, 74HCT, 74LVC).</p><p><strong>Parametry:</strong> V_IH, V_IL (vstupní úrovně), V_OH, V_OL (výstupní), I_OH, I_OL (proudová zatížitelnost), t_PD (propagační zpoždění), fan-out (počet vstupů, které může výstup řídit).</p>',

          {id:'pameti-registry',title:'Paměti a registry',

// ===================== PROGRESS (localStorage) =====================
function getProgress() {
  try { return JSON.parse(localStorage.getItem('wys_progress')||'{}'); } catch{ return {}; }
}
function setProgress(topicId, score, total) {
  const p = getProgress();
  p[topicId] = {score, total, date:Date.now()};
  localStorage.setItem('wys_progress', JSON.stringify(p));
}
function getTopicProgress(topicId) {
  const p = getProgress();
  return p[topicId] || {score:0, total:0};
}

// ===================== AUTH UI =====================
function renderTopBar() {
  const bar = document.getElementById('topBarAuth');
  if (currentUser) {
    const email = currentUser.email||'';
    const initial = email.charAt(0).toUpperCase();
    bar.innerHTML = '<div class="user-info"><div class="user-avatar">'+initial+'</div><span>'+email.split('@')[0]+'</span><button class="logout-btn" id="logoutBtn">Odhlásit</button></div>';
    setTimeout(()=>{
      const btn = document.getElementById('logoutBtn');
      if(btn) btn.onclick = ()=>fb.signOut(auth);
    },0);
  } else {
    bar.innerHTML = '<button class="auth-btn" id="showAuthBtn">🔑 Přihlásit</button>';
    setTimeout(()=>{
      const btn = document.getElementById('showAuthBtn');
      if(btn) btn.onclick = openAuthModal;
    },0);
  }
}

function openAuthModal() {
  const modal = document.getElementById('authModal');
  const body = document.getElementById('authModalBody');
  body.innerHTML = '<div class="auth-tab-bar"><button class="auth-tab active" data-tab="login">Přihlásit</button><button class="auth-tab" data-tab="register">Registrovat</button></div><div class="auth-error" id="authError"></div><div class="auth-form"><div class="form-group"><label>Email</label><input type="email" id="authEmail" placeholder="tvuj@email.cz"/></div><div class="form-group"><label>Heslo</label><input type="password" id="authPassword" placeholder="min. 6 znaků"/></div><button class="btn auth-submit" id="authSubmit">Přihlásit se</button></div>';
  modal.classList.add('active');
  let mode = 'login';
  setTimeout(()=>{
    const tabs = body.querySelectorAll('.auth-tab');
    const sub = body.querySelector('#authSubmit');
    const em = body.querySelector('#authEmail');
    const pw = body.querySelector('#authPassword');
    const err = body.querySelector('#authError');
    tabs.forEach(t=>t.onclick=()=>{
      tabs.forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      mode = t.dataset.tab;
      sub.textContent = mode==='login'?'Přihlásit se':'Registrovat se';
      err.style.display='none';
    });
    sub.onclick = async()=>{
      const email = em.value.trim();
      const pass = pw.value;
      if(!email||pass.length<6){err.textContent='Zadej platný email a heslo (min. 6)';err.style.display='block';return;}
      if(!fb||!auth){err.textContent='Přihlašování není dostupné.';err.style.display='block';return;}
      err.style.display='none';
      sub.disabled=true;sub.textContent='...';
      try{
        if(mode==='login') await fb.signInWithEmailAndPassword(auth,email,pass);
        else await fb.createUserWithEmailAndPassword(auth,email,pass);
        modal.classList.remove('active');
      }catch(e){
        let m = e.message;
        if(e.code==='auth/user-not-found'||e.code==='auth/invalid-credential') m='Špatný email nebo heslo.';
        else if(e.code==='auth/email-already-in-use') m='Email už je registrovaný.';
        err.textContent=m;err.style.display='block';
      }
      sub.disabled=false;sub.textContent=mode==='login'?'Přihlásit se':'Registrovat se';
    };
  },0);
}
document.getElementById('authModalClose').onclick = ()=>document.getElementById('authModal').classList.remove('active');
document.getElementById('authModal').onclick = e=>{if(e.target===e.currentTarget) document.getElementById('authModal').classList.remove('active');};
if(fb) fb.onAuthStateChanged(auth, user=>{currentUser=user;renderTopBar();});

// ===================== NAVIGATION =====================
function showSection(id) {
  document.querySelectorAll('.app-section').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById(id);
  if(el) el.classList.add('active');
}

function goToSubjects() {
  showSection('appSubjects');
  renderSubjects();
}
function goToYears(subjectId) {
  currentSubject = subjectId;
  showSection('appYears');
  renderYears(subjectId);
}
function goToTopics(subjectId, year) {
  currentSubject = subjectId;
  currentYear = year;
  showSection('appTopics');
  renderTopics(subjectId, year);
}
function goToTopic(subjectId, year, topicId) {
  currentSubject = subjectId;
  currentYear = year;
  currentTopic = topicId;
  showSection('appTopicDetail');
  renderTopicDetail(subjectId, year, topicId);
}
function goToHome() { currentSubject=null;currentYear=null;currentTopic=null;goToSubjects(); }

// ===================== RENDER SUBJECTS =====================
function renderSubjects() {
  const grid = document.getElementById('subjectsGrid');
  grid.innerHTML = subjects.map(s =>
    '<div class="subject-card" onclick="goToYears(\''+s.id+'\')">'+
      '<div class="subject-card-icon">'+s.icon+'</div>'+
      '<div class="subject-card-name">'+s.name+'</div>'+
      '<div class="subject-card-desc">'+s.desc+'</div>'+
    '</div>'
  ).join('');
}

// ===================== RENDER YEARS =====================
function renderYears(subjectId) {
  const sub = CURRICULUM[subjectId];
  if(!sub) return;
  document.getElementById('yearSubHeader').innerHTML = '<h2>'+sub.icon+' '+sub.name+'</h2><p>'+sub.description+'</p>';
  const grid = document.getElementById('yearsGrid');
  grid.innerHTML = Object.entries(sub.years).map(([num, yr]) =>
    '<div class="year-card" onclick="goToTopics(\''+subjectId+'\','+num+')">'+
      '<div class="year-card-num">'+num+'.</div>'+
      '<div class="year-card-title">'+yr.title+'</div>'+
      '<div class="year-card-desc">'+yr.description+'</div>'+
    '</div>'
  ).join('');
}

// ===================== RENDER TOPICS =====================
function renderTopics(subjectId, year) {
  const sub = CURRICULUM[subjectId];
  const yr = sub.years[year];
  document.getElementById('topicSubHeader').innerHTML = '<h2>'+sub.icon+' '+sub.name+' &raquo; '+yr.title+'</h2><p>'+yr.description+'</p>';
  const grid = document.getElementById('topicsGrid');
  grid.innerHTML = yr.topics.map(t => {
    const prog = getTopicProgress(t.id);
    const pct = prog.total>0 ? Math.round(prog.score/prog.total*100) : 0;
    return '<div class="topic-card" onclick="goToTopic(\''+subjectId+'\','+year+',\''+t.id+'\')">'+
      '<div class="topic-card-title">'+t.title+'</div>'+
      '<div class="topic-card-desc">'+t.content.replace(/<[^>]+>/g,'').substring(0,120)+'…</div>'+
      '<div class="topic-progress'+(pct===100?' complete':'')+'">'+
        '<span>'+(prog.total>0?prog.score+'/'+prog.total:'✕')+'</span>'+
        '<div class="topic-progress-bar"><div class="topic-progress-fill" style="width:'+pct+'%"></div></div>'+
      '</div></div>';
  }).join('');
}

// ===================== RENDER TOPIC DETAIL =====================
function renderTopicDetail(subjectId, year, topicId) {
  const sub = CURRICULUM[subjectId];
  const yr = sub.years[year];
  const topic = yr.topics.find(t=>t.id===topicId);
  if(!topic) return;
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML =
    '<span onclick="goToSubjects()">Předměty</span><span class="sep">›</span>'+
    '<span onclick="goToYears(\''+subjectId+'\')">'+sub.name+'</span><span class="sep">›</span>'+
    '<span onclick="goToTopics(\''+subjectId+'\','+year+')">'+yr.title+'</span><span class="sep">›</span>'+
    '<span class="current">'+topic.title+'</span>';

  const detail = document.getElementById('topicDetail');
  detail.innerHTML = '<div class="topic-detail-content">'+topic.content+'</div><div class="quiz-section" id="quizSection"></div>';
  renderQuiz(topic.quiz, topic.id);
}

// ===================== QUIZ =====================
function renderQuiz(questions, topicId) {
  const section = document.getElementById('quizSection');
  if(!section||!questions||!questions.length) return;
  const prog = topicId ? getTopicProgress(topicId) : {score:0,total:0};
  let html = '<h3>📝 Interaktivní kvíz'+(topicId?' <span style="color:#64748b;font-weight:400;font-size:14px">('+prog.score+'/'+prog.total+' správně)</span>':'')+'</h3>';
  questions.forEach((q,i)=>{
    const letters = ['A','B','C','D'];
    const opts = [
      {text:q.a,correct:true},{text:q.b,correct:false},
      {text:q.c,correct:false},{text:q.d,correct:false}
    ];
    const shuffled = opts.sort(()=>Math.random()-0.5);
    html += '<div class="quiz-question" data-index="'+i+'"><div class="q-text">'+(i+1)+'. '+q.q+'</div><div class="quiz-options">';
    shuffled.forEach((o,oi)=>{
      html += '<div class="quiz-option" data-correct="'+o.correct+'" data-index="'+i+'"><span class="letter">'+letters[oi]+'</span><span>'+o.text+'</span></div>';
    });
    html += '</div></div>';
  });
  html += '<div class="quiz-result" id="quizResult" style="display:none"></div>';
  section.innerHTML = html;
  let score=0, answered=0;
  const total = questions.length;
  section.querySelectorAll('.quiz-option').forEach(opt=>{
    opt.onclick=()=>{
      const qIdx = parseInt(opt.dataset.index);
      const qEl = opt.closest('.quiz-question');
      const all = qEl.querySelectorAll('.quiz-option');
      if(all[0].classList.contains('disabled')) return;
      all.forEach(o=>o.classList.add('disabled'));
      answered++;
      const correct = opt.dataset.correct==='true';
      if(correct){opt.classList.add('correct');score++;}
      else{
        opt.classList.add('wrong');
        all.forEach(o=>{if(o.dataset.correct==='true') o.classList.add('reveal-correct');});
      }
      if(answered===total){
        const res = document.getElementById('quizResult');
        res.style.display='block';
        const pct = Math.round(score/total*100);
        const msg = pct===100?'✨ Perfektní! Zvládáš to skvěle!':pct>=60?'👍 Dobrá práce! Ještě trochu procvič.':'💪 Zkus to znovu, procvičování dělá mistra.';
        res.innerHTML = '<div class="score">'+score+' <small>/ '+total+'</small></div><p>'+msg+'</p><button class="reset-quiz" onclick="renderQuiz(CURRICULUM[\''+currentSubject+'\'].years['+currentYear+'].topics.find(t=>t.id===\''+currentTopic+'\').quiz,\''+currentTopic+'\')">🔄 Zkusit znovu</button>';
        if(topicId) setProgress(topicId, score, total);
      }
    };
  });
}

// ===================== SEARCH =====================
document.getElementById('searchInput').addEventListener('input', function(){
  const q = this.value.trim().toLowerCase();
  const resDiv = document.getElementById('searchResults');
  if(q.length<2){resDiv.innerHTML='<div class="empty-state">Zadej alespoň 2 znaky pro hledání</div>';showSection('appSubjects');return;}
  const results = [];
  Object.entries(CURRICULUM).forEach(([sid,sub])=>{
    Object.entries(sub.years).forEach(([ynum,yr])=>{
      yr.topics.forEach(t=>{
        const text = t.title+' '+t.content.replace(/<[^>]+>/g,' ').toLowerCase();
        if(text.includes(q)) results.push({subjectId:sid, subjectName:sub.name, subjectIcon:sub.icon, year:parseInt(ynum), yearTitle:yr.title, topic:t});
      });
    });
  });
  if(!results.length){resDiv.innerHTML='<div class="empty-state">🔍 Žádné výsledky pro "'+q+'"</div>';showSection('appSearch');return;}
  resDiv.innerHTML = results.slice(0,30).map(r =>
    '<div class="search-result-item" onclick="goToTopic(\''+r.subjectId+'\','+r.year+',\''+r.topic.id+'\')">'+
      '<div class="sri-subject">'+r.subjectIcon+' '+r.subjectName+' — '+r.yearTitle+'</div>'+
      '<div class="sri-title">'+r.topic.title+'</div>'+
      '<div class="sri-meta">'+r.topic.content.replace(/<[^>]+>/g,'').substring(0,100)+'…</div>'+
    '</div>'
  ).join('');
  showSection('appSearch');
});
document.getElementById('backFromSearch').onclick = ()=>{document.getElementById('searchInput').value='';goToHome();};
document.getElementById('backToSubjects').onclick = goToHome;
document.getElementById('backToYears').onclick = ()=>goToYears(currentSubject);
document.getElementById('backToSubjects').onclick = goToHome;
document.addEventListener('keydown', e=>{if(e.key==='Escape'){document.getElementById('authModal').classList.remove('active');}});

// ===================== INIT =====================
renderTopBar();
renderSubjects();
</script>
