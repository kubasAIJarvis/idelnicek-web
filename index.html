<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idělníček – studijní materiály pro středoškoláky</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .bg-glow {
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.15), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    header {
      padding: 60px 0 40px;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .logo span {
      font-size: 28px;
      -webkit-text-fill-color: #e0e0e0;
      background: none;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 18px;
      margin-top: 8px;
    }

    .tagline {
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 100px;
      padding: 8px 20px;
      display: inline-block;
      margin-top: 16px;
      font-size: 14px;
      color: #818cf8;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      padding: 20px 0 60px;
    }

    .card {
      background: linear-gradient(145deg, rgba(30,30,50,0.9), rgba(20,20,35,0.9));
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 16px;
      padding: 28px;
      transition: transform 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(99,102,241,0.4);
    }

    .card-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .card h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card .subject {
      font-size: 13px;
      color: #818cf8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .card p {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
      flex: 1;
    }

    .card .price {
      font-size: 28px;
      font-weight: 700;
      color: #c084fc;
      margin-bottom: 16px;
    }

    .card .price small {
      font-size: 14px;
      font-weight: 400;
      color: #64748b;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      padding: 12px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: opacity 0.2s;
      width: 100%;
      text-align: center;
      border: none;
      cursor: pointer;
    }

    .btn:hover { opacity: 0.9; }

    .btn-success {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(99,102,241,0.4);
      color: #818cf8;
      margin-top: 8px;
    }

    .btn-outline:hover {
      background: rgba(99,102,241,0.1);
    }

    .badge {
      display: inline-block;
      background: rgba(34,197,94,0.15);
      color: #4ade80;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 10px;
      align-self: flex-start;
    }

    .badge-hot {
      background: rgba(239,68,68,0.15);
      color: #f87171;
    }

    .badge-new {
      background: rgba(59,130,246,0.15);
      color: #60a5fa;
    }

    .unlocked-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(34,197,94,0.15);
      color: #4ade80;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 100px;
      margin-top: 12px;
      font-weight: 600;
    }

    footer {
      text-align: center;
      padding: 40px 0;
      color: #475569;
      font-size: 14px;
      border-top: 1px solid rgba(99,102,241,0.1);
    }

    footer a {
      color: #818cf8;
      text-decoration: none;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: linear-gradient(145deg, #1e1e32, #16162a);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 20px;
      padding: 36px;
      max-width: 460px;
      width: 100%;
      position: relative;
      animation: modalIn 0.2s ease-out;
    }

    @keyframes modalIn {
      from { transform: scale(0.95) translateY(10px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: #64748b;
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
    }

    .modal-close:hover {
      color: #e0e0e0;
    }

    .modal h2 {
      font-size: 22px;
      margin-bottom: 4px;
      color: #fff;
      padding-right: 30px;
    }

    .modal .modal-subject {
      font-size: 13px;
      color: #818cf8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .modal .modal-price {
      font-size: 36px;
      font-weight: 800;
      color: #c084fc;
      margin-bottom: 24px;
    }

    .modal .modal-price small {
      font-size: 18px;
      font-weight: 400;
      color: #64748b;
    }

    .paypal-info {
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .paypal-info p {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .paypal-email {
      font-size: 18px;
      font-weight: 700;
      color: #e0e0e0;
      word-break: break-all;
      background: rgba(0,0,0,0.3);
      padding: 10px 14px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      user-select: all;
    }

    .paypal-email .copy-btn {
      background: rgba(99,102,241,0.2);
      border: none;
      color: #818cf8;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .paypal-email .copy-btn:hover {
      background: rgba(99,102,241,0.3);
    }

    .paypal-email .copy-btn.copied {
      background: rgba(34,197,94,0.3);
      color: #4ade80;
    }

    .payment-steps {
      list-style: none;
      padding: 0;
      margin-bottom: 20px;
    }

    .payment-steps li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #94a3b8;
      font-size: 14px;
      padding: 6px 0;
      line-height: 1.5;
    }

    .payment-steps li .step-num {
      background: rgba(99,102,241,0.2);
      color: #818cf8;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ===== UNLOCKED STATE IN MODAL ===== */
    .modal-unlocked {
      text-align: center;
    }

    .modal-unlocked .unlock-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .modal-unlocked h2 {
      padding-right: 0;
    }

    .modal-unlocked p {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      padding: 14px 36px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: opacity 0.2s;
      width: 100%;
    }

    .download-btn:hover { opacity: 0.9; }

    .modal .note {
      color: #475569;
      font-size: 13px;
      margin-top: 16px;
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      header { padding: 40px 0 24px; }
      .logo { font-size: 36px; }
      .products { grid-template-columns: 1fr; }
      .modal { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <header>
      <div class="logo">idělníček<span>.cz</span></div>
      <p class="subtitle">Studijní materiály, který fakt pomůžou</p>
      <div class="tagline">✨ AI-powered 📖 pro středoškoláky</div>
    </header>

    <div class="products" id="products"></div>

    <div style="text-align:center;padding:0 0 40px">
      <p style="color:#64748b;font-size:15px;margin-bottom:16px">Chceš něco jiného? Napiš, uděláme ti materiál na míru.</p>
      <a class="btn" href="mailto:info@idelnicek.cz?subject=Material%20na%20miru" style="width:auto;padding:12px 40px">💡 Objednat materiál na míru</a>
    </div>

    <footer>
      <p>&copy; 2026 idělníček.cz — Studijní materiály pro středoškoláky</p>
      <p style="margin-top:4px">Platby přes PayPal / Bankovní převod</p>
    </footer>
  </div>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="paymentModal">
    <div class="modal" id="modalContent">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const PAYPAL_EMAIL = 'kubejk007@gmail.com';

    const products = [
      {
        id: 'baroko',
        icon: '📜',
        subject: 'Čeština – Literatura',
        title: 'České baroko',
        desc: 'Přehled autorů a děl, znaky baroka, historický kontext, J. A. Komenský. Včetně testu a zkouškových otázek.',
        price: 50,
        badge: { text: '🔥 Nejoblíbenější', className: 'badge-hot' },
        driveLink: 'https://drive.google.com/your-file-link-1' // TODO: nahrad vlastnim odkazem
      },
      {
        id: 'kvadraticke-rovnice',
        icon: '📊',
        subject: 'Matematika',
        title: 'Kvadratické rovnice',
        desc: 'Všechny typy kvadratických rovnic, diskriminant, Viètovy vzorce, řešené příklady, tahák vzorců a test.',
        price: 50,
        badge: { text: '📐 Populární', className: '' },
        driveLink: 'https://drive.google.com/your-file-link-2' // TODO: nahrad vlastnim odkazem
      },
      {
        id: '7segment',
        icon: '🔌',
        subject: 'Microprocesorová technika',
        title: '7segmentový displej',
        desc: 'Princip, CC vs CA, tabulka kódů, 3 ukázkové programy v assembleru 8051, multiplexování.',
        price: 50,
        badge: { text: '⚡ Novinka', className: 'badge-new' },
        driveLink: 'https://drive.google.com/your-file-link-3' // TODO: nahrad vlastnim odkazem
      }
    ];

    function getUnlocked() {
      try { return JSON.parse(localStorage.getItem('idelnicek_unlocked') || '[]'); } catch { return []; }
    }

    function setUnlocked(id) {
      const arr = getUnlocked();
      if (!arr.includes(id)) { arr.push(id); localStorage.setItem('idelnicek_unlocked', JSON.stringify(arr)); }
    }

    function isUnlocked(id) {
      return getUnlocked().includes(id);
    }

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = products.map(p => {
        const unlocked = isUnlocked(p.id);
        return `
          <div class="card" data-id="${p.id}">
            ${p.badge ? `<div class="badge ${p.badge.className}">${p.badge.text}</div>` : ''}
            <div class="card-icon">${p.icon}</div>
            <div class="subject">${p.subject}</div>
            <h3>${p.title}</h3>
            <p>${p.desc}</p>
            <div class="price">${p.price} <small>Kč</small></div>
            ${unlocked
              ? `<a class="btn btn-success" href="${p.driveLink}" target="_blank" rel="noopener">📥 Stáhnout materiál</a>
                 <div class="unlocked-badge">✓ Odemčeno</div>`
              : `<button class="btn buy-btn" data-id="${p.id}">Koupit</button>`
            }
          </div>
        `;
      }).join('');

      document.querySelectorAll('.buy-btn').forEach(btn => {
        btn.addEventListener('click', () => openModal(btn.dataset.id));
      });
    }

    function openModal(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;

      const modal = document.getElementById('paymentModal');
      const body = document.getElementById('modalBody');

      if (isUnlocked(productId)) {
        body.innerHTML = `
          <div class="modal-unlocked">
            <div class="unlock-icon">✅</div>
            <h2>${product.title}</h2>
            <p>Materiál už máš odemčený. Můžeš si ho stáhnout kdykoli.</p>
            <a class="download-btn" href="${product.driveLink}" target="_blank" rel="noopener">📥 Stáhnout PDF</a>
          </div>
        `;
      } else {
        body.innerHTML = `
          <h2>${product.title}</h2>
          <div class="modal-subject">${product.subject}</div>
          <div class="modal-price">${product.price} <small>Kč</small></div>

          <div class="paypal-info">
            <p>📧 Pošli platbu na PayPal účet:</p>
            <div class="paypal-email">
              ${PAYPAL_EMAIL}
              <button class="copy-btn" id="copyPaypal">Kopírovat</button>
            </div>
          </div>

          <ol class="payment-steps">
            <li><span class="step-num">1</span> Pošli <strong>${product.price} Kč</strong> na PayPal účet <strong>${PAYPAL_EMAIL}</strong></li>
            <li><span class="step-num">2</span> Po odeslání platby klikni na tlačítko "Odeslal/a jsem platbu"</li>
            <li><span class="step-num">3</span> Materiál se ti automaticky odemkne a můžeš si ho stáhnout</li>
          </ol>

          <button class="btn btn-success" id="confirmPayment">✓ Odeslal/a jsem platbu</button>
          <p class="note">Materiál zůstane odemčený i při příští návštěvě.</p>
        `;
      }

      modal.classList.add('active');
      document.body.style.overflow = 'hidden';

      setTimeout(() => {
        const copyBtn = document.getElementById('copyPaypal');
        if (copyBtn) {
          copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(PAYPAL_EMAIL).then(() => {
              copyBtn.textContent = '✓ Zkopírováno';
              copyBtn.classList.add('copied');
              setTimeout(() => {
                copyBtn.textContent = 'Kopírovat';
                copyBtn.classList.remove('copied');
              }, 2000);
            }).catch(() => {
              const range = document.createRange();
              const emailEl = copyBtn.closest('.paypal-email');
              range.selectNodeContents(emailEl);
              const sel = window.getSelection();
              sel.removeAllRanges();
              sel.addRange(range);
            });
          });
        }

        const confirmBtn = document.getElementById('confirmPayment');
        if (confirmBtn) {
          confirmBtn.addEventListener('click', () => {
            setUnlocked(productId);
            renderProducts();
            openModal(productId);
          });
        }
      }, 0);
    }

    document.getElementById('modalClose').addEventListener('click', () => {
      document.getElementById('paymentModal').classList.remove('active');
      document.body.style.overflow = '';
    });

    document.getElementById('paymentModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        document.getElementById('paymentModal').classList.remove('active');
        document.body.style.overflow = '';
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('paymentModal').classList.remove('active');
        document.body.style.overflow = '';
      }
    });

    renderProducts();
  </script>
</body>
</html>
