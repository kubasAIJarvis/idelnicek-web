<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write your own school – studijní materiály pro středoškoláky</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
    .bg-glow{position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,0.15),transparent 70%);pointer-events:none;z-index:0}
    .container{max-width:960px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
    header{padding:40px 0 20px;text-align:center}
    .logo{font-size:42px;font-weight:800;background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px}
    .subtitle{color:#94a3b8;font-size:16px;margin-top:6px}
    .tagline{background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);border-radius:100px;padding:6px 18px;display:inline-block;margin-top:12px;font-size:13px;color:#818cf8}
    .top-bar{display:flex;align-items:center;justify-content:flex-end;gap:12px;padding:12px 0}
    .auth-btn{background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);color:#818cf8;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
    .auth-btn:hover{background:rgba(99,102,241,0.2)}
    .user-info{display:flex;align-items:center;gap:10px;font-size:13px;color:#94a3b8}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
    .logout-btn{background:none;border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
    .logout-btn:hover{background:rgba(239,68,68,0.1)}
    .section-title{text-align:center;padding:10px 0 0}
    .section-title h2{font-size:28px;font-weight:800;color:#e0e0e0;margin-bottom:6px}
    .section-title p{color:#94a3b8;font-size:15px}
    .subjects{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:24px 0 40px}
    .subject-card{background:linear-gradient(145deg,rgba(30,30,50,0.9),rgba(20,20,35,0.9));border:1px solid rgba(99,102,241,0.15);border-radius:14px;padding:24px 20px;transition:transform .2s,border-color .2s;display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer}
    .subject-card:hover{transform:translateY(-3px);border-color:rgba(99,102,241,0.35)}
    .subject-card-icon{font-size:36px;margin-bottom:10px}
    .subject-card-name{font-size:15px;font-weight:700;color:#e0e0e0;margin-bottom:6px}
    .subject-card-desc{font-size:13px;color:#94a3b8;line-height:1.5;margin-bottom:14px;flex:1}
    .btn{display:inline-block;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:12px 28px;border-radius:10px;text-decoration:none;font-weight:600;font-size:15px;transition:opacity .2s;width:100%;text-align:center;border:none;cursor:pointer}
    .btn:hover{opacity:.9}
    .btn-outline{background:transparent;border:1px solid rgba(99,102,241,0.4);color:#818cf8}
    .btn-sm{padding:8px 16px;font-size:13px;width:auto;display:inline-block}
    .btn-back{background:transparent;border:1px solid rgba(99,102,241,0.3);color:#818cf8;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s;margin-bottom:8px;display:inline-block}
    .btn-back:hover{background:rgba(99,102,241,0.1)}
    footer{text-align:center;padding:40px 0;color:#475569;font-size:14px;border-top:1px solid rgba(99,102,241,0.1)}
    .app-section{display:none}
    .app-section.active{display:block;animation:fadeIn .25s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .breadcrumb{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:16px 0 8px;font-size:14px;color:#64748b}
    .breadcrumb span{cursor:pointer;transition:color .2s}
    .breadcrumb span:hover{color:#818cf8}
    .breadcrumb .sep{color:#334155;cursor:default}
    .breadcrumb .current{color:#818cf8;font-weight:600}
    .years{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:24px 0}
    .year-card{background:linear-gradient(145deg,rgba(30,30,50,0.9),rgba(20,20,35,0.9));border:1px solid rgba(99,102,241,0.15);border-radius:14px;padding:24px 20px;text-align:center;cursor:pointer;transition:transform .2s,border-color .2s}
    .year-card:hover{transform:translateY(-3px);border-color:rgba(99,102,241,0.35)}
    .year-card-num{font-size:40px;font-weight:800;color:#818cf8;margin-bottom:6px}
    .year-card-title{font-size:15px;font-weight:700;color:#e0e0e0;margin-bottom:4px}
    .year-card-desc{font-size:13px;color:#94a3b8}
    .topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding:20px 0 40px}
    .topic-card{background:linear-gradient(145deg,rgba(30,30,50,0.9),rgba(20,20,35,0.9));border:1px solid rgba(99,102,241,0.15);border-radius:12px;padding:18px 20px;cursor:pointer;transition:transform .2s,border-color .2s}
    .topic-card:hover{transform:translateY(-2px);border-color:rgba(99,102,241,0.35)}
    .topic-card-title{font-size:15px;font-weight:700;color:#e0e0e0;margin-bottom:6px}
    .topic-card-desc{font-size:13px;color:#94a3b8;line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .topic-progress{display:flex;align-items:center;gap:8px;font-size:12px;color:#64748b}
    .topic-progress-bar{flex:1;height:4px;background:rgba(99,102,241,0.15);border-radius:2px;overflow:hidden}
    .topic-progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:2px;transition:width .3s}
    .topic-progress.complete .topic-progress-fill{background:linear-gradient(90deg,#22c55e,#16a34a)}
    .topic-progress.complete{color:#22c55e}
    .topic-detail{padding:16px 0 40px}
    .topic-detail-content{background:rgba(0,0,0,0.2);border-radius:14px;padding:24px;margin-bottom:20px;line-height:1.8}
    .topic-detail-content h3{color:#818cf8;font-size:18px;margin:24px 0 12px}
    .topic-detail-content h3:first-child{margin-top:0}
    .topic-detail-content h4{color:#c084fc;font-size:16px;margin:16px 0 8px}
    .topic-detail-content p{color:#cbd5e1;font-size:15px;margin-bottom:12px}
    .topic-detail-content ul,.topic-detail-content ol{color:#cbd5e1;font-size:15px;margin:8px 0 12px;padding-left:24px}
    .topic-detail-content li{margin-bottom:6px}
    .topic-detail-content strong{color:#e0e0e0}
    .topic-detail-content em{color:#94a3b8}
    .topic-detail-content hr{border:none;border-top:1px solid rgba(99,102,241,0.12);margin:24px 0}
    .topic-detail-content .formula{display:block;text-align:center;background:rgba(99,102,241,0.08);border-radius:8px;padding:12px 16px;margin:12px 0;color:#c084fc;font-size:16px;font-weight:600;font-style:italic}
    .quiz-section{margin-top:8px}
    .quiz-section h3{color:#818cf8;font-size:17px;margin-bottom:16px}
    .quiz-question{background:rgba(0,0,0,0.2);border:1px solid rgba(99,102,241,0.1);border-radius:12px;padding:16px;margin-bottom:14px}
    .quiz-question .q-text{font-size:15px;font-weight:600;color:#e0e0e0;margin-bottom:12px;line-height:1.5}
    .quiz-options{display:flex;flex-direction:column;gap:8px}
    .quiz-option{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid rgba(99,102,241,0.15);cursor:pointer;transition:all .2s;font-size:14px;color:#cbd5e1}
    .quiz-option:hover{border-color:rgba(99,102,241,0.4);background:rgba(99,102,241,0.05)}
    .quiz-option .letter{width:26px;height:26px;border-radius:50%;background:rgba(99,102,241,0.15);color:#818cf8;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
    .quiz-option.correct{border-color:#22c55e;background:rgba(34,197,94,0.1)}
    .quiz-option.correct .letter{background:#22c55e;color:#fff}
    .quiz-option.wrong{border-color:#ef4444;background:rgba(239,68,68,0.1)}
    .quiz-option.wrong .letter{background:#ef4444;color:#fff}
    .quiz-option.disabled{pointer-events:none;opacity:.7}
    .quiz-option.reveal-correct{border-color:#22c55e;background:rgba(34,197,94,0.05)}
    .quiz-option.reveal-correct .letter{background:#22c55e;color:#fff}
    .quiz-result{text-align:center;padding:20px;background:rgba(99,102,241,0.08);border-radius:12px;margin-top:16px}
    .quiz-result .score{font-size:32px;font-weight:800;color:#c084fc}
    .quiz-result .score small{font-size:16px;color:#64748b}
    .quiz-result p{color:#94a3b8;font-size:14px;margin-top:4px}
    .quiz-result .reset-quiz{margin-top:12px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#818cf8;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s}
    .quiz-result .reset-quiz:hover{background:rgba(99,102,241,0.25)}
    .search-wrap{position:relative;flex:1;max-width:320px}
    .search-wrap input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(99,102,241,0.2);border-radius:8px;padding:8px 14px 8px 34px;color:#e0e0e0;font-size:14px;font-family:inherit;transition:border-color .2s}
    .search-wrap input:focus{outline:none;border-color:rgba(99,102,241,0.5)}
    .search-wrap .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#64748b;font-size:14px;pointer-events:none}
    .search-results{padding:12px 0}
    .search-result-item{background:linear-gradient(145deg,rgba(30,30,50,0.9),rgba(20,20,35,0.9));border:1px solid rgba(99,102,241,0.1);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
    .search-result-item:hover{border-color:rgba(99,102,241,0.3)}
    .search-result-item .sri-subject{font-size:12px;color:#818cf8;margin-bottom:2px}
    .search-result-item .sri-title{font-size:15px;font-weight:600;color:#e0e0e0}
    .search-result-item .sri-meta{font-size:12px;color:#64748b;margin-top:2px}
    .back-to-home{display:inline-block;margin-bottom:16px;color:#818cf8;cursor:pointer;font-size:14px;transition:color .2s;background:none;border:none;font-family:inherit}
    .back-to-home:hover{color:#c084fc}
    .sub-header{text-align:center;padding:8px 0 16px}
    .sub-header h2{font-size:26px;font-weight:800;margin-bottom:4px}
    .sub-header p{color:#94a3b8;font-size:14px}
    .empty-state{text-align:center;padding:60px 20px;color:#64748b}
    .empty-state .icon{font-size:48px;margin-bottom:12px}
    @media(max-width:600px){
      header{padding:30px 0 16px}
      .logo{font-size:32px}
      .subjects{grid-template-columns:repeat(2,1fr);gap:10px}
      .subject-card{padding:16px}
      .years{grid-template-columns:repeat(2,1fr);gap:10px}
      .topics{grid-template-columns:1fr;gap:10px}
      .topic-detail-content{padding:16px}
      .search-wrap{max-width:200px}
      .top-bar{flex-wrap:wrap;gap:8px}
    }
  </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">
  <div class="top-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Hledat téma...">
    </div>
    <div id="topBarAuth"></div>
  </div>
  <header>
    <div class="logo">Write your own school</div>
    <p class="subtitle">Studijní materiály, které fakt pomůžou</p>
    <div class="tagline">📚 kompletní učivo SŠ • interaktivní kvízy • maturita</div>
  </header>
  <div id="appSubjects" class="app-section active">
    <div class="section-title"><h2>📚 Vyber si předmět</h2><p>Proklikej se k tématům a procvičuj s kvízy</p></div>
    <div class="subjects" id="subjectsGrid"></div>
  </div>
  <div id="appYears" class="app-section">
    <button class="back-to-home" id="backToSubjects">← Zpět na předměty</button>
    <div class="sub-header" id="yearSubHeader"></div>
    <div class="years" id="yearsGrid"></div>
  </div>
  <div id="appTopics" class="app-section">
    <button class="back-to-home" id="backToYears">← Zpět na ročníky</button>
    <div class="sub-header" id="topicSubHeader"></div>
    <div class="topics" id="topicsGrid"></div>
  </div>
  <div id="appTopicDetail" class="app-section">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="topic-detail" id="topicDetail"></div>
  </div>
  <div id="appSearch" class="app-section">
    <button class="back-to-home" id="backFromSearch">← Zpět</button>
    <div class="sub-header"><h2>🔍 Výsledky hledání</h2></div>
    <div class="search-results" id="searchResults"></div>
  </div>
  <footer><p>© 2026 Write your own school — Studijní materiály pro středoškoláky</p></footer>
</div>
<div class="modal-overlay" id="authModal">
  <div class="modal" style="max-width:400px">
    <button class="modal-close" id="authModalClose">×</button>
    <div id="authModalBody"></div>
  </div>
</div>
<script type="module">
const CURRICULUM = {
  'cestina-literatura': {
    name:'Čeština – Literatura',icon:'📜',description:'Literární směry, autoři, díla a rozbory textů',
    years:{
      1:{
        title:'1. ročník',description:'Od starověku ke klasicismu',
        topics:[
          {id:'staroveka-literatura',title:'Starověká literatura',
            content:'<h3>📖 Starověká literatura – přehled</h3><p>Starověká literatura představuje nejstarší literární památky lidstva vznikající od 4. tisíciletí př. n. l. po zánik Západořímské říše (476 n. l.). Mezi nejvýznamnější civilizace patří Mezopotámie, Egypt, Indie, Čína, Izrael, Řecko a Řím.</p><p>Mezopotámská literatura je známá díky <strong>Eposu o Gilgamešovi</strong> (2. tisíciletí př. n. l.), který vypráví o uruckém králi hledajícím nesmrtelnost. Jde o jedno z nejstarších dochovaných literárních děl, psané klínovým písmem na hliněných tabulkách.</p><p>Starověké Řecko položilo základy evropské literatury. Homérovy eposy <strong>Ilias</strong> a <strong>Odysseia</strong> (8. stol. př. n. l.) jsou základními díly. Řecké drama se rozvíjelo v Athénách v 5. stol. př. n. l. – <strong>Aischylos</strong> (Oresteia), <strong>Sofoklés</strong> (Král Oidipus) a <strong>Eurípidés</strong> (Médeia). Římská literatura navázala na řeckou – <strong>Vergilius</strong> napsal epos <strong>Aeneis</strong>, <strong>Ovidius</strong> vytvořil <strong>Proměny</strong>.</p><p>Staroslověnská literatura na Velké Moravě začala působením <strong>Konstantina a Metoděje</strong> (863), kteří přinesli hlaholici a překládali biblické texty.</p>',
            quiz:[
              {q:'Které dílo je považováno za nejstarší dochovaný epos?',a:'Epos o Gilgamešovi',b:'Ilias',c:'Aeneis',d:'Mahabhárata'},
              {q:'Kdo napsal řecké drama Král Oidipus?',a:'Sofoklés',b:'Aischylos',c:'Eurípidés',d:'Homér'},
              {q:'Jak se jmenuje římský epos od Vergilia?',a:'Aeneis',b:'Ilias',c:'Odysseia',d:'Proměny'},
              {q:'Kdy přišli Konstantin a Metoděj na Velkou Moravu?',a:'863',b:'855',c:'874',d:'896'},
              {q:'Která sbírka Ovidia obsahuje mytologické příběhy o proměnách?',a:'Proměny',b:'Listy heroin',c:'Umění milovat',d:'Fasti'}
            ]},
          {id:'stredoveka-literatura',title:'Středověká literatura',
            content:'<h3>📖 Středověká literatura</h3><p>Středověká literatura se dělí na raný (5.–11. stol.) a vrcholný středověk (12.–15. stol.). Dominantní je vliv křesťanství a latiny. Vedle latinské literatury se rozvíjí literatura v národních jazycích.</p><p>V českém prostředí je klíčovou památkou <strong>Legenda o sv. Václavovi</strong> a <strong>Kronika česká</strong> (Chronica Boemorum) od <strong>Kosmy</strong>, prvního českého kronikáře. Ve 14. století vznikla <strong>Dalimilova kronika</strong> a literatura doby Karla IV. – sám Karel IV. napsal <strong>Vita Caroli</strong>.</p><p><strong>Tomáš Štítný ze Štítného</strong> psal česky nábožensko-filozofické spisy. <strong>Mistr Jan Hus</strong> svými spisy (O církvi) položil základy reformace. Husova betlémská kázání v češtině přispěla k rozvoji spisovné češtiny.</p>',
            quiz:[
              {q:'Kdo napsal první českou kroniku Chronica Boemorum?',a:'Kosmas',b:'Dalimil',c:'Václav Hájek z Libočan',d:'Karel IV.'},
              {q:'Který jazyk převládal ve středověké písemné literatuře?',a:'Latina',b:'Čeština',c:'Němčina',d:'Řečtina'},
              {q:'Jak se jmenuje životopis Karla IV.?',a:'Vita Caroli',b:'Legenda aurea',c:'Oráč z Čech',d:'Kronika česká'},
              {q:'Kdo psal česky nábožensko-filozofické spisy ve 14. století?',a:'Tomáš Štítný ze Štítného',b:'Jan Hus',c:'Mistr Klaret',d:'Petr Chelčický'},
              {q:'Které dílo napsal Jan Hus?',a:'O církvi',b:'Knížky o hře šachové',c:'Síť víry',d:'Postila'}
            ]},
          {id:'renesance-humanismus',title:'Renesance a humanismus',
            content:'<h3>📖 Renesance a humanismus (14.–16. století)</h3><p>Renesance (znovuzrození) vznikla v Itálii ve 14. století. Hlavním znakem je návrat k antickým ideálům, důraz na člověka (humanismus), rozvoj vědy a umění. Dochází k odklonu od středověkého teocentrismu k antropocentrismu.</p><p>V Itálii vynikají <strong>Francesco Petrarca</strong> (Canzoniere – sonety na L gru) a <strong>Giovanni Boccaccio</strong> (Dekameron). Nejvýznamnějším renesančním autorem je <strong>William Shakespeare</strong> (Hamlet, Romeo a Julie, Macbeth, Othello, Sen noci svatojánské).</p><p>V českých zemích je renesance spojena s <strong>Janem Blahoslavem</strong> (Gramatika česká) a <strong>Danielem Adamem z Veleslavína</strong>. Evropským humanistou byl <strong>Erasmus Rotterdamský</strong> (Chvála bláznivosti). <strong>Miguel de Cervantes</strong> napsal <strong>Don Quijote</strong>.</p>',
            quiz:[
              {q:'Kdo napsal Dekameron?',a:'Giovanni Boccaccio',b:'Francesco Petrarca',c:'Dante Alighieri',d:'Niccolò Machiavelli'},
              {q:'Nejslavnější dílo Erasma Rotterdamského?',a:'Chvála bláznivosti',b:'Utopie',c:'Kníže',d:'Don Quijote'},
              {q:'Která Shakespearova hra je tragédie?',a:'Hamlet',b:'Sen noci svatojánské',c:'Kupec benátský',d:'Zkrocení zlé ženy'},
              {q:'Autor Dona Quijota?',a:'Miguel de Cervantes',b:'Lope de Vega',c:'Francisco de Quevedo',d:'Pedro Calderón de la Barca'},
              {q:'Co znamená renesance?',a:'Znovuzrození',b:'Objevování',c:'Osvícení',d:'Pokrok'}

          {id:'baroko-klasicismus',title:'Baroko a klasicismus',
            content:'<h3>📖 Baroko a klasicismus (17.–18. století)</h3><p><strong>Baroko</strong> (z port. barroco = perla) je umělecký směr 17. a 1. pol. 18. století. Vzniklo v Itálii jako reakce na reformaci. Barokní literatura je charakteristická složitostí, metaforami a silnými emocemi. Hlavními tématy jsou pomíjivost života (vanitas), smrt a víra v Boha.</p><p>V českém prostředí je nejvýznamnějším barokním dílem <strong>Labyrint světa a ráj srdce</strong> od <strong>Jana Amose Komenského</strong>. Komenský také napsal <strong>Didaktiku velkou</strong> a <strong>Bránu jazyků otevřenou</strong>. Z domácí barokní literatury vyniká <strong>Fridrich Bridel</strong> (Co Bůh? Člověk?).</p><p><strong>Klasicismus</strong> vznikl ve Francii za Ludvíka XIV., klade důraz na rozum, řád a napodobování antiky. Hlavní autor: <strong>Molière</strong> (Lakomec, Tartuffe, Misantrop, Zdravý nemocný).</p>',

          {id:'romantismus',title:'Romantismus',

        topics:[
          {id:'vyroky-mnoziny',title:'Výroky a množiny',
            content:'<h3>📖 Výroky a množiny</h3><p><strong>Výrok</strong> je sdělení, o němž můžeme rozhodnout, zda je pravdivé nebo nepravdivé (pravdivostní hodnota 1 nebo 0). Složené výroky tvoříme pomocí logických spojek: konjunkce (a zároveň ∧), disjunkce (nebo ∨), negace (není pravda že ¬), implikace (jestliže pak ⇒), ekvivalence (právě když ⇔).</p><p><strong>Množina</strong> je soubor objektů. Značíme ji velkými písmeny, prvky malými. Zápis: A = {1, 2, 3}. Operace: sjednocení ∪, průnik ∩, rozdíl \ , doplněk. Vennovy diagramy slouží k znázornění vztahů mezi množinami.</p><p><strong>Číselné obory:</strong> N (přirozená), Z (celá), Q (racionální), R (reálná). Platí: N ⊂ Z ⊂ Q ⊂ R. Intervaly: uzavřené ⟨a,b⟩, otevřené (a,b), polootevřené.</p>',
            quiz:[

          {id:'ciselne-obory-algebraicke-vyrazy',title:'Číselné obory a algebraické výrazy',
            content:'<h3>📖 Číselné obory a algebraické výrazy</h3><p><strong>Algebraický výraz</strong> je zápis obsahující čísla, proměnné a operace. Např. 3x² + 2x − 1. <strong>Mocniny:</strong> aⁿ = a·a·...·a (n-krát), a⁰ = 1 (pro a≠0), a⁻ⁿ = 1/aⁿ.</p><p><strong>Odmocniny:</strong> ⁿ√a = b ⇔ bⁿ = a. √a je druhá odmocnina. Vlastnosti: √(a·b) = √a·√b, √(a/b) = √a/√b.</p><p><strong>Mnohočleny (polynomy):</strong> sčítání, odčítání, násobení, dělení. Rozklad na součin: vytknutí, vzorce (a±b)² = a²±2ab+b², a²−b² = (a+b)(a−b).</p><p><strong>Zlomky:</strong> sčítání (přes společného jmenovatele), násobení (čitatel×čitatel), dělení (násobení převrácenou hodnotou).</p>',
            quiz:[
              {q:'Kolik je a⁰ pro a≠0?',a:'1',b:'0',c:'a',d:'Nedefinováno'},
              {q:'Vzorec (a+b)² =',a:'a² + 2ab + b²',b:'a² + b²',c:'a² − 2ab + b²',d:'2a + 2b'},
              {q:'√(a·b) =',a:'√a · √b',b:'√a + √b',c:'a · √b',d:'√a / √b'},
              {q:'a⁻ⁿ =',a:'1/aⁿ',b:'−aⁿ',c:'1/aⁿ',d:'(−a)ⁿ'},
              {q:'Rozklad a²−b² =',a:'(a+b)(a−b)',b:'(a−b)²',c:'(a+b)²',d:'a²−2ab+b²'}
            ]},
          {id:'rovnice-nerovnice',title:'Rovnice a nerovnice',
            content:'<h3>📖 Rovnice a nerovnice</h3><p><strong>Lineární rovnice</strong> s jednou neznámou: ax + b = 0, řešení x = −b/a (pro a≠0). Ekvivalentní úpravy: přičtení/odečtení, vynásobení/vydělení nenulovým číslem.</p><p><strong>Kvadratické rovnice:</strong> ax² + bx + c = 0. Diskriminant D = b² − 4ac. Pokud D>0: 2 reálné kořeny, D=0: 1 dvojnásobný, D<0: žádný reálný. Vzorec: x₁,₂ = (−b ± √D)/(2a).</p><p><strong>Soustavy rovnic:</strong> řešení metodou dosazovací, sčítací nebo graficky. <strong>Nerovnice:</strong> řešíme podobně jako rovnice, ale při násobení záporným číslem se otáčí znaménko nerovnosti.</p>',

              {q:'Diskriminant kvadratické rovnice:',a:'D = b² − 4ac',b:'D = b² + 4ac',c:'D = 4ac − b²',d:'D = √(b²−4ac)'},
              {q:'Pokud D=0, kvadratická rovnice má:',a:'1 dvojnásobný kořen',b:'2 různé kořeny',c:'Žádný reálný kořen',d:'Nekonečně mnoho'},
              {q:'Při násobení nerovnice záporným číslem:',a:'Otáčíme znaménko nerovnosti',b:'Nic se nemění',c:'Nerovnost neplatí',d:'Měníme strany'},
              {q:'Metoda sčítací se používá k:',a:'Řešení soustav rovnic',b:'Řešení kvadratických rovnic',c:'Úpravě výrazů',d:'Výpočtu obsahu'}
            ]},
          {id:'funkce',title:'Funkce',
            content:'<h3>📖 Funkce</h3><p><strong>Funkce</strong> je předpis, který každému prvku z definičního oboru přiřadí právě jeden prvek z oboru hodnot. Značíme f: y = f(x).</p><p><strong>Lineární funkce:</strong> f(x) = ax + b. Grafem je přímka. a je směrnice (určuje sklon), b je posun na ose y. Pokud a>0, funkce rostoucí; a<0, klesající.</p><p><strong>Kvadratická funkce:</strong> f(x) = ax² + bx + c. Grafem je parabola. Vrchol V = [−b/(2a), f(−b/(2a))]. Pro a>0 otevřená nahoru, a<0 dolů.</p><p><strong>Další funkce:</strong> lineární lomená (nepřímá úměrnost y = k/x), mocninná (y = xⁿ), exponenciální (y = aˣ), logaritmická (y = logₐ x), goniometrické (sin, cos, tg, cotg).</p>',

            content:'<h3>📖 Mocniny a odmocniny</h3><p><strong>Mocniny s celočíselným exponentem:</strong> aⁿ = a·a·...·a, a⁰=1, a⁻ⁿ = 1/aⁿ. Pravidla: aᵐ·aⁿ = aᵐ⁺ⁿ, aᵐ/aⁿ = aᵐ⁻ⁿ, (aᵐ)ⁿ = aᵐⁿ, (ab)ⁿ = aⁿ·bⁿ.</p><p><strong>Mocniny s racionálním exponentem:</strong> aᵐ/ⁿ = ⁿ√aᵐ. Toto propojuje mocniny a odmocniny.</p><p><strong>Odmocniny:</strong> ⁿ√a = a¹/ⁿ. Sčítání/odčítání: pouze stejné odmocniny. Usměrňování zlomků (odstranění odmocniny ze jmenovatele).</p><p><strong>Věta:</strong> ⁿ√(a·b) = ⁿ√a · ⁿ√b, ⁿ√(a/b) = ⁿ√a / ⁿ√b.</p>',

          {id:'goniometrie',title:'Goniometrie',
            content:'<h3>📖 Goniometrie</h3><p>Goniometrie studuje goniometrické funkce a vztahy mezi úhly a stranami trojúhelníků.</p><p><strong>Funkce sin, cos, tg, cotg:</strong> sin α = protilehlá/přepona, cos α = přilehlá/přepona, tg α = protilehlá/přilehlá, cotg α = přilehlá/protilehlá.</p><p><strong>Jednotková kružnice:</strong> poloměr 1, úhel se měří od kladné osy x. Hodnoty funkcí pro 0°, 30°, 45°, 60°, 90° a další. Znaménka v kvadrantech.</p><p><strong>Vzorce:</strong> sin²α + cos²α = 1, tg α = sin α / cos α, sin(α±β), cos(α±β), dvojnásobný úhel.</p>',

          {id:'trigonometrie',title:'Trigonometrie',
            content:'<h3>📖 Trigonometrie</h3><p>Trigonometrie řeší vztahy v trojúhelnících.</p><p><strong>Sinová věta:</strong> a/sin α = b/sin β = c/sin γ = 2r (kde r je poloměr kružnice opsané). Použití: známe dva úhly a jednu stranu, nebo dvě strany a úhel proti jedné z nich.</p><p><strong>Kosinová věta:</strong> a² = b² + c² − 2bc·cos α. Zobecnění Pythagorovy věty. Použití: známe tři strany, nebo dvě strany a úhel jimi sevřený.</p><p><strong>Obsah trojúhelníku:</strong> S = (1/2)ab·sin γ, S = √(s(s−a)(s−b)(s−c)) (Heronův vzorec).</p>',

              {q:'Heronův vzorec se používá pro:',a:'Obsah trojúhelníku',b:'Obvod trojúhelníku',c:'Poloměr kružnice',d:'Výšku trojúhelníku'},
              {q:'Kosinová věta zobecňuje:',a:'Pythagorovu větu',b:'Euklidovu větu',c:'Thaletovu větu',d:'Fermatovu větu'},

          {id:'posloupnosti-rady',title:'Posloupnosti a řady',
            content:'<h3>📖 Posloupnosti a řady</h3><p><strong>Posloupnost</strong> je funkce s definičním oborem přirozených čísel. Značíme (aₙ).</p><p><strong>Aritmetická posloupnost:</strong> aₙ₊₁ = aₙ + d (d = diference). Vzorec: aₙ = a₁ + (n−1)d. Součet prvních n členů: sₙ = n(a₁ + aₙ)/2.</p><p><strong>Geometrická posloupnost:</strong> aₙ₊₁ = aₙ·q (q = kvocient). aₙ = a₁·qⁿ⁻¹. Součet: sₙ = a₁·(qⁿ−1)/(q−1) pro q≠1.</p><p><strong>Nekonečná geometrická řada:</strong> pro |q|<1 má součet s = a₁/(1−q).</p>',

      3:{
        title:'3. ročník',description:'Analytická geometrie, geometrie, kombinatorika, pravděpodobnost',
        topics:[
          {id:'analyticka-geometrie',title:'Analytická geometrie',
            content:'<h3>📖 Analytická geometrie</h3><p>Analytická geometrie popisuje geometrické útvary pomocí souřadnic a rovnic.</p><p><strong>Přímka v rovině:</strong> obecná rovnice ax + by + c = 0. Parametrické vyjádření: X = A + t·(B−A). Směrový vektor, normálový vektor.</p><p><strong>Kružnice:</strong> (x−m)² + (y−n)² = r², střed S[m,n], poloměr r. <strong>Elipsa:</strong> (x−m)²/a² + (y−n)²/b² = 1. <strong>Hyperbola, parabola.</strong></p><p><strong>Vektor:</strong> u = (u₁, u₂), velikost |u| = √(u₁²+u₂²). Skalární součin: u·v = u₁v₁+u₂v₂.</p>',
            quiz:[
              {q:'Obecná rovnice přímky:',a:'ax+by+c=0',b:'y=ax+b',c:'y−y₁=k(x−x₁)',d:'x/a+y/b=1'},
              {q:'Rovnice kružnice se středem S[m,n]:',a:'(x−m)²+(y−n)²=r²',b:'x²+y²=r²',c:'(x+m)²+(y+n)²=r²',d:'(x−m)²−(y−n)²=r²'},

          {id:'geometrie-rovina-prostor',title:'Geometrie v rovině a prostoru',
            content:'<h3>📖 Geometrie v rovině a prostoru</h3><p>Planimetrie (rovina) – útvary: trojúhelník, čtyřúhelník, kruh, obsah a obvod. Stereometrie (prostor) – tělesa: krychle, kvádr, jehlan, kužel, koule, válec.</p><p><strong>Tělesa:</strong> Objem krychle V = a³, povrch S = 6a². Kvádr V = abc, S = 2(ab+ac+bc). Koule V = (4/3)πr³, S = 4πr². Válec V = πr²v, S = 2πr(r+v). Jehlan V = (1/3)Sₚ·v.</p><p><strong>Euklidovy věty:</strong> v² = cₐ·c₆, a² = c·cₐ, b² = c·c₆ (v pravoúhlém trojúhelníku s přeponou c a výškou v na přeponu).</p>',
            quiz:[

              {q:'Euklidova věta o výšce: v² =',a:'cₐ·c₆',b:'a·b',c:'c²−a²',d:'a²+b²'},
              {q:'Povrch krychle S =',a:'6a²',b:'a³',c:'4a²',d:'2a²'},

          {id:'kombinatorika',title:'Kombinatorika',
            content:'<h3>📖 Kombinatorika</h3><p>Kombinatorika zkoumá počty způsobů uspořádání a výběru prvků.</p><p><strong>Faktoriál:</strong> n! = 1·2·3·...·n, 0! = 1. <strong>Kombinační číslo:</strong> C(n,k) = n!/(k!(n−k)!) = (ₖⁿ).</p><p><strong>Permutace (pořadí):</strong> P(n) = n! – počet způsobů seřazení n prvků. Permutace s opakováním.</p><p><strong>Variace:</strong> V(n,k) = n!/(n−k)! – uspořádaný výběr k prvků z n. <strong>Kombinace:</strong> C(n,k) – neuspořádaný výběr.</p><p><strong>Kombinace s opakováním:</strong> C*(n,k) = C(n+k−1, k).</p>',
            quiz:[
              {q:'n! =',a:'1·2·3·...·n',b:'1+2+...+n',c:'nⁿ',d:'2ⁿ'},
              {q:'C(n,k) =',a:'n!/(k!(n−k)!)',b:'n!/(n−k)!',c:'n!/k!',d:'(n−k)!/k!'},
              {q:'Permutace n prvků:',a:'n!',b:'n',c:'2ⁿ',d:'n²'},
              {q:'0! =',a:'1',b:'0',c:'Nedefinováno',d:'∞'},
              {q:'Kombinační číslo (ₖⁿ) určuje:',a:'Neuspořádaný výběr k z n',b:'Uspořádaný výběr',c:'Počet prvků',d:'Faktoriál'}
            ]},
          {id:'pravdepodobnost',title:'Pravděpodobnost',
            content:'<h3>📖 Pravděpodobnost</h3><p>Pravděpodobnost vyjadřuje míru očekávání, že nastane určitý jev. Hodnoty v intervalu ⟨0, 1⟩.</p><p><strong>Klasická pravděpodobnost:</strong> P(A) = |A|/|Ω|, kde Ω je množina všech možných výsledků, A je jev, o který nám jde.</p><p><strong>Podmíněná pravděpodobnost:</strong> P(A|B) = P(A∩B)/P(B). <strong>Nezávislé jevy:</strong> P(A∩B) = P(A)·P(B).</p><p><strong>Binomické rozdělení:</strong> P(X=k) = C(n,k)·pᵏ·(1−p)ⁿ⁻ᵏ. <strong>Pravděpodobnost sjednocení:</strong> P(A∪B) = P(A)+P(B)−P(A∩B).</p>',
            quiz:[
              {q:'Pravděpodobnost je v rozsahu:',a:'⟨0,1⟩',b:'(0,1)',c:'⟨−1,1⟩',d:'⟨0,∞)'},
              {q:'Klasická pravděpodobnost P(A)=',a:'|A|/|Ω|',b:'|Ω|/|A|',c:'|A|·|Ω|',d:'|A|−|Ω|'},
              {q:'Pro nezávislé jevy P(A∩B)=',a:'P(A)·P(B)',b:'P(A)+P(B)',c:'P(A)−P(B)',d:'P(A)/P(B)'},
              {q:'P(A∪B)=',a:'P(A)+P(B)−P(A∩B)',b:'P(A)+P(B)+P(A∩B)',c:'P(A)·P(B)',d:'P(A)+P(B)'},

            ]}

        topics:[
          {id:'statistika',title:'Statistika',
            content:'<h3>📖 Statistika</h3><p>Statistika se zabývá sběrem, zpracováním a analýzou dat.</p><p><strong>Charakteristiky polohy:</strong> aritmetický průměr x̄ = (∑xᵢ)/n, medián (prostřední hodnota), modus (nejčastější hodnota).</p><p><strong>Charakteristiky variability:</strong> rozptyl s² = (∑(xᵢ−x̄)²)/n, směrodatná odchylka s = √s², variační rozpětí R = xₘₐₓ − xₘᵢₙ.</p><p><strong>Grafické znázornění:</strong> histogram, krabicový graf, koláčový graf. <strong>Kvartily:</strong> Q₁ (dolní), Q₂ (medián), Q₃ (horní).</p>',
            quiz:[
              {q:'Aritmetický průměr:',a:'(∑xᵢ)/n',b:'xₘₐₓ−xₘᵢₙ',c:'Prostřední hodnota',d:'Nejčastější hodnota'},
              {q:'Medián je:',a:'Prostřední hodnota',b:'Průměr',c:'Nejčastější',d:'Největší'},
              {q:'Směrodatná odchylka je:',a:'√rozptyl',b:'Rozptyl',c:'Variační rozpětí',d:'Medián'},
              {q:'Modus je:',a:'Nejčastější hodnota',b:'Nejmenší hodnota',c:'Prostřední',d:'Průměr'},

            ]},
          {id:'zaklady-diferencialniho-poctu',title:'Základy diferenciálního počtu',
            content:'<h3>📖 Základy diferenciálního počtu</h3><p>Diferenciální počet studuje limity a derivace funkcí.</p><p><strong>Limita funkce:</strong> lim(x→a) f(x) = L – hodnota, ke které se f(x) blíží, když se x blíží a. </p><p><strong>Derivace:</strong> f\'(x) = lim(h→0) (f(x+h)−f(x))/h. Geometrický význam: směrnice tečny ke grafu funkce.</p><p><strong>Základní derivace:</strong> (xⁿ)\' = nxⁿ⁻¹, (sin x)\' = cos x, (cos x)\' = −sin x, (eˣ)\' = eˣ, (ln x)\' = 1/x.</p><p><strong>Pravidla:</strong> (f±g)\' = f\'±g\', (f·g)\' = f\'·g + f·g\', (f/g)\' = (f\'·g−f·g\')/g².</p>',
            quiz:[
              {q:'Derivace f\'(x) geometricky:',a:'Směrnice tečny',b:'Obsah pod křivkou',c:'Funkční hodnota',d:'Limita v bodě'},
              {q:'(xⁿ)\' =',a:'nxⁿ⁻¹',b:'nxⁿ⁺¹',c:'xⁿ⁻¹',d:'n·xⁿ'},
              {q:'(eˣ)\' =',a:'eˣ',b:'x·eˣ⁻¹',c:'ln x',d:'1/x'},
              {q:'(sin x)\' =',a:'cos x',b:'−cos x',c:'−sin x',d:'tg x'},
              {q:'(f·g)\' =',a:'f\'·g + f·g\'',b:'f\'·g\'',c:'f·g\'',d:'f\'·g'}
            ]},
          {id:'zaklady-integralniho-poctu',title:'Základy integrálního počtu',
            content:'<h3>📖 Základy integrálního počtu</h3><p>Integrální počet je opakem derivování. <strong>Určitý integrál</strong> ∫ₐᵇ f(x)dx vyjadřuje obsah plochy pod křivkou na intervalu ⟨a,b⟩.</p><p><strong>Primitivní funkce (neurčitý integrál):</strong> ∫xⁿ dx = xⁿ⁺¹/(n+1) + C, ∫1/x dx = ln|x| + C, ∫sin x dx = −cos x + C, ∫cos x dx = sin x + C.</p><p><strong>Newton-Leibnizova věta:</strong> ∫ₐᵇ f(x)dx = F(b)−F(a), kde F je primitivní funkce k f.</p>',
            quiz:[
              {q:'Určitý integrál vyjadřuje:',a:'Obsah plochy pod křivkou',b:'Délku křivky',c:'Objem tělesa',d:'Směrnici tečny'},
              {q:'∫xⁿ dx =',a:'xⁿ⁺¹/(n+1)+C',b:'nxⁿ⁻¹+C',c:'xⁿ⁻¹/(n−1)+C',d:'xⁿ·ln x+C'},
              {q:'∫cos x dx =',a:'sin x + C',b:'−sin x + C',c:'cos x + C',d:'−cos x + C'},
              {q:'Newton-Leibniz:',a:'∫ₐᵇ f = F(b)−F(a)',b:'∫ₐᵇ f = F(a)−F(b)',c:'∫ₐᵇ f = f(b)−f(a)',d:'∫ₐᵇ f = f\'(b)−f\'(a)'},
              {q:'∫1/x dx =',a:'ln|x| + C',b:'1/x² + C',c:'eˣ + C',d:'x·ln x + C'}
            ]},
          {id:'opakovani-k-maturite-matematika',title:'Opakování k maturitě – Matematika',
            content:'<h3>📖 Opakování k maturitě</h3><p>Didaktický test z matematiky obsahuje uzavřené i otevřené úlohy. Čas 120 minut. Témata: algebraické výrazy, rovnice a nerovnice, funkce, geometrie, posloupnosti, kombinatorika, pravděpodobnost, statistika.</p><p><strong>Časté typy úloh:</strong> řešení kvadratické rovnice, určení definičního oboru, výpočet obsahu/objemu, geometrické konstrukce, logické úlohy.</p><p><strong>Tipy:</strong> Začni lehkými úlohami. Piš postup řešení. Zkontroluj výsledky dosazením. Pozor na jednotky.</p>',
            quiz:[

              {q:'Řešení x²−4=0 je:',a:'x=±2',b:'x=±4',c:'x=2',d:'x=−2'},
              {q:'Definiční obor √(x−1):',a:'x≥1',b:'x>1',c:'x≤1',d:'x∈R'},
              {q:'Obsah kruhu o poloměru r:',a:'πr²',b:'2πr',c:'πr',d:'(4/3)πr³'},
              {q:'Pravděpodobnost hodu 6 na kostce:',a:'1/6',b:'1/2',c:'1/3',d:'1'}

        topics:[
          {id:'pritomny-cas-prosty-prubehovy',title:'Přítomný čas prostý a průběhový',
            content:'<h3>📖 Present Simple vs Present Continuous</h3><p><strong>Present Simple</strong> (přítomný čas prostý) používáme pro: opakované děje (I go to school every day), fakta a obecné pravdy (Water boils at 100°C), časové rozvrhy (The train leaves at 6 PM). Tvoření: kmen slovesa, u 3. osoby jednotného čísla koncovka -s/-es. Otázka s do/does, zápor s don\'t/doesn\'t.</p><p><strong>Present Continuous</strong> (přítomný čas průběhový) používáme pro: děj právě probíhající (I am reading now), dočasné situace (She is staying with us this week), plány do blízké budoucnosti (We are meeting tomorrow). Tvoření: be (am/is/are) + sloveso s -ing.</p><p><strong>Rozdíl:</strong> I work (pracuji obecně) × I am working (právě pracuji). Slovesa, která netvoří průběhový tvar (stative verbs): know, believe, love, hate, want, need, seem.</p>',
            quiz:[
              {q:'Present Simple pro 3. osobu: He ___ (go) to school.',a:'goes',b:'go',c:'going',d:'is going'},
              {q:'Present Continuous tvoříme:',a:'be + -ing',b:'have + -ed',c:'will + verb',d:'verb + -s'},
              {q:'Které sloveso není stative?',a:'run',b:'know',c:'believe',d:'love'},
              {q:'The train ___ at 6 PM (časový rozvrh):',a:'leaves',b:'is leaving',c:'leave',d:'has left'},

          {id:'there-is-are-cleny',title:'There is/are, členy, počitatelnost',
            content:'<h3>📖 There is/are, členy a počitatelnost</h3><p><strong>There is/are</strong> (there is pro jednotné, there are pro množné) používáme pro označení existence: There is a book on the table. There are three chairs in the room. V hovorové angličtině there\'s pro obě čísla.</p><p><strong>Členy:</strong> a/an – neurčitý člen pro nespecifikovanou věc (a book, an apple). The – určitý člen pro konkrétní věc nebo když už byla zmíněna. Bez členu (zero article) u obecných pojmů v množném čísle a nepočitatelných: Cats are cute. I like music.</p><p><strong>Počitatelná a nepočitatelná podstatná jména:</strong> countable (book, apple, car) – mají množné číslo. Uncountable (water, rice, information, advice) – nemají množné číslo, používají much, a little. Countable používají many, a few.</p>',
            quiz:[
              {q:'Množné číslo existenciální vazby:',a:'There are',b:'There is',c:'There have',d:'There has'},
              {q:'Neurčitý člen před samohláskou:',a:'an',b:'a',c:'the',d:'—'},
              {q:'Které slovo je nepočitatelné?',a:'information',b:'apple',c:'book',d:'car'},
              {q:'Much se pojí s:',a:'Nepočitatelnými',b:'Počitatelnými',c:'Jen množným číslem',d:'Jen jednotným'},
              {q:'"___ cat is on ___ roof." (konkrétní)',a:'The, the',b:'A, a',c:'A, the',d:'The, a'}
            ]},
          {id:'cleny-pocitatelnost',title:'Členy a počitatelnost podstatných jmen',
            content:'<h3>📖 Členy – podrobněji</h3><p>Určitý člen <strong>the</strong> používáme: když je podstatné jméno jedinečné (the sun, the Earth), když už bylo zmíněno (I saw a dog. The dog was big.), před superlativy (the best), před řadovými číslovkami (the first), před názvy řek, moří, pohoří (the Vltava, the Alps).</p><p>Bez členu: před vlastními jmény (John lives in Prague), před názvy kontinentů, zemí (Europe, Czech Republic – výjimka the USA, the UK), před jídly (Breakfast is ready), před sporty (I play tennis).</p><p>Neurčitý člen <strong>a/an</strong> poprvé zmíněná věc, profese (He is a teacher), s číslovkou hundred/thousand, v rate (50 km an hour).</p>',
            quiz:[
              {q:'The Earth – proč?',a:'Jedinečnost',b:'Poprvé zmíněno',c:'Superlativ',d:'Profese'},
              {q:'He is ___ teacher.',a:'a',b:'an',c:'the',d:'—'},
              {q:'I play ___ tennis.',a:'—',b:'a',c:'an',d:'the'},
              {q:'Který název země je s the?',a:'the USA',b:'Czech Republic',c:'France',d:'Germany'},
              {q:'___ best student – správně:',a:'the',b:'a',c:'an',d:'—'}
            ]},
          {id:'slovni-zasoba-kazdodenni-zivot',title:'Slovní zásoba: každodenní život',
            content:'<h3>📖 Slovní zásoba – každodenní život</h3><p><strong>Daily routine:</strong> wake up, get up, have breakfast, go to school/work, have lunch, come home, do homework, have dinner, watch TV, go to bed.</p><p><strong>School subjects:</strong> Czech, English, Maths, Science, History, Geography, PE (Physical Education), Art, Music, IT (Information Technology).</p><p><strong>Family:</strong> mother, father, sister, brother, grandmother, grandfather, aunt, uncle, cousin, nephew, niece.</p><p><strong>House and home:</strong> living room, bedroom, kitchen, bathroom, hall, garden, furniture (table, chair, bed, cupboard, sofa, wardrobe). <strong>Food:</strong> bread, butter, cheese, meat, vegetables, fruit, drinks (water, milk, juice, coffee, tea).</p><p><strong>Useful phrases:</strong> How are you? I\'m fine, thanks. What time is it? It\'s half past two. Can I help you? Yes, please. Excuse me. Sorry. Thank you. You\'re welcome.</p>',
            quiz:[

      2:{
        title:'2. ročník',description:'Minulé časy, předpřítomný čas, budoucnost',
        topics:[
          {id:'minuly-cas-prosty-prubehovy',title:'Minulý čas prostý a průběhový',
            content:'<h3>📖 Past Simple vs Past Continuous</h3><p><strong>Past Simple</strong> (minulý čas prostý) – dokončené děje v minulosti: I visited London last year. Pravidelná slovesa: +ed (work→worked). Nepravidelná: 2. tvar (go→went, eat→ate). Otázka s did, zápor s didn\'t.</p><p><strong>Past Continuous</strong> (minulý čas průběhový) – děj probíhající v určitém okamžiku minulosti: I was watching TV at 8 PM. Tvoření: was/were + -ing. Použití: dlouhý děj přerušený krátkým (I was sleeping when the phone rang). Dva souběžné děje (While I was cooking, he was reading).</p><p>Past Simple vs Past Continuous: I walked home (prostě jsem šel domů) vs I was walking home when... (šel jsem domů a vtom...).</p>',
            quiz:[
              {q:'Past Simple pravidelných sloves:',a:'+ed',b:'+ing',c:'will + verb',d:'have + -ed'},
              {q:'Nepravidelné: go →',a:'went',b:'goed',c:'gone',d:'going'},
              {q:'Past Continuous tvar: I ___ (read) at 8 PM.',a:'was reading',b:'read',c:'have read',d:'was read'},
              {q:'Otázka v Past Simple: You saw him → ___?',a:'Did you see him?',b:'Did you saw?',c:'Do you see?',d:'Have you seen?'},
              {q:'While I ___ (cook), he ___ (read).',a:'was cooking, was reading',b:'cooked, read',c:'have cooked, have read',d:'cook, read'}
            ]},
          {id:'predpritomny-cas',title:'Předpřítomný čas (Present Perfect)',
            content:'<h3>📖 Present Perfect</h3><p><strong>Present Perfect</strong> spojuje minulost s přítomností. Tvoření: have/has + past participle (3. tvar).</p><p><strong>Použití:</strong> (1) životní zkušenosti – I have visited Paris. (2) děj začal v minulosti a trvá dosud – I have lived here for 5 years. (3) nedávný děj s dopadem na teď – I have lost my keys (nemám je teď). (4) s just, already, yet, ever, never, lately.</p><p><strong>For × Since:</strong> for + časové období (for two years, for a week). since + konkrétní bod v minulosti (since 2020, since Monday).</p><p><strong>Past Simple vs Present Perfect:</strong> I saw that movie (kdy? v minulosti, hotovo) vs I have seen that movie (zkušenost, nevíme kdy).</p>',
            quiz:[
              {q:'Present Perfect tvoříme:',a:'have/has + 3. tvar',b:'have/has + -ing',c:'was/were + -ing',d:'did + verb'},
              {q:'S just používáme:',a:'Present Perfect',b:'Past Simple',c:'Present Simple',d:'Future'},
              {q:'Since se pojí s:',a:'Konkrétním bodem (since 2020)',b:'Obdobím (for 2 years)',c:'Budoucností',d:'Minulým časem'},
              {q:'I have never ___ (be) to London.',a:'been',b:'was',c:'be',d:'being'},
              {q:'Rozdíl: I saw × I have seen',a:'Zkušenost × konkrétní čas',b:'Minulost × přítomnost',c:'Jednotné × množné',d:'Dokonavé × nedokonavé'}
            ]},
          {id:'stupnovani-pridavnych-jmen',title:'Stupňování přídavných jmen',
            content:'<h3>📖 Stupňování přídavných jmen</h3><p>Přídavná jména stupňujeme: 1. stupeň (positive), 2. stupeň – komparativ (comparative), 3. stupeň – superlativ (superlative).</p><p><strong>Krátká přídavná jména</strong> (1–2 slabiky): +er, +est – tall → taller → the tallest; big → bigger → the biggest; happy → happier → the happiest.</p><p><strong>Dlouhá přídavná jména</strong> (3+ slabiky): more, the most – beautiful → more beautiful → the most beautiful.</p><p><strong>Nepravidelná:</strong> good → better → the best; bad → worse → the worst; far → farther/further → the farthest/furthest; much/many → more → the most; little → less → the least.</p><p>Použití: as...as (stejný), not as...as (méně), than (než), the...the (čím...tím).</p>',
            quiz:[
              {q:'Taller je:',a:'2. stupeň',b:'1. stupeň',c:'3. stupeň',d:'Základní tvar'},
              {q:'Superlativ beautiful:',a:'the most beautiful',b:'beautifuler',c:'more beautiful',d:'the beautifulest'},
              {q:'Nepravidelný tvar: good →',a:'better → best',b:'gooder → goodest',c:'more good → most good',d:'well → weller'},
              {q:'Porovnávání: "as ___ as"',a:'stejný stupeň',b:'vyšší stupeň',c:'nižší stupeň',d:'nejvyšší stupeň'},
              {q:'Big → bigger → the biggest – proč zdvojení?',a:'Krátká samohláska + souhláska',b:'Dlouhá samohláska',c:'Koncovka -y',d:'Výjimka'}
            ]},
          {id:'vyjadreni-budoucnosti',title:'Vyjádření budoucnosti',
            content:'<h3>📖 Vyjádření budoucnosti</h3><p>V angličtině máme několik způsobů vyjádření budoucnosti:</p><p><strong>Will + infinitiv:</strong> (1) předpovědi – It will rain tomorrow. (2) okamžitá rozhodnutí – I\'ll help you. (3) sliby, nabídky – I\'ll call you later. (4) s I think, I hope, probably, certainly.</p><p><strong>Going to:</strong> (1) plány a záměry – I\'m going to study medicine. (2) předpověď na základě důkazu – Look at those clouds! It\'s going to rain.</p><p><strong>Present Continuous pro budoucnost:</strong> pevné domluvené plány – I\'m meeting friends tonight.</p><p><strong>Present Simple pro budoucnost:</strong> časové rozvrhy – The train leaves at 6 PM.</p>',
            quiz:[
              {q:'Will pro okamžité rozhodnutí:',a:'I\'ll help you.',b:'I\'m helping you.',c:'I\'m going to help.',d:'I help you.'},
              {q:'Going to pro plán:',a:'I\'m going to study.',b:'I\'ll study.',c:'I study.',d:'I\'m studying.'},
              {q:'Předpověď s důkazem (mraky):',a:'It\'s going to rain.',b:'It will rain.',c:'It rains.',d:'It is raining.'},
              {q:'Present Continuous pro budoucnost:',a:'We are meeting tomorrow.',b:'We meet tomorrow.',c:'We will meet.',d:'We are going to meet.'},
              {q:'"I think it ___ rain" – správně:',a:'will',b:'is going to',c:'is',d:'—'}

      3:{
        title:'3. ročník',description:'Podmínkové věty, trpný rod, frázová slovesa',
        topics:[
          {id:'podminkove-vety',title:'Podmínkové věty (Conditionals)',
            content:'<h3>📖 Podmínkové věty</h3><p><strong>Zero conditional</strong> – obecné pravdy: If + present simple, present simple. If you heat ice, it melts.</p><p><strong>First conditional</strong> – reálná podmínka v budoucnosti: If + present simple, will + infinitiv. If it rains, I will stay home.</p><p><strong>Second conditional</strong> – nereálná podmínka v přítomnosti: If + past simple, would + infinitiv. If I had money, I would travel. Pro "být" v minulém čase používáme were pro všechny osoby: If I were you, I would go.</p><p><strong>Third conditional</strong> – nereálná podmínka v minulosti (litování): If + past perfect, would have + past participle. If I had studied, I would have passed.</p>',
            quiz:[
              {q:'Zero conditional: If you ___ ice, it ___.',a:'heat, melts',b:'will heat, melts',c:'heat, will melt',d:'heated, melted'},
              {q:'First conditional: If it ___, I ___ stay.',a:'rains, will',b:'will rain, will',c:'rained, would',d:'rains, would'},
              {q:'Second conditional: If I ___ you, I ___ go.',a:'were, would',b:'was, will',c:'am, would',d:'were, will'},
              {q:'Third conditional: If I ___ studied, I ___ passed.',a:'had, would have',b:'have, would',c:'had, will have',d:'studied, have'},
              {q:'If I had money (teď ho nemám) – který kondicionál?',a:'Second',b:'First',c:'Third',d:'Zero'}
            ]},
          {id:'trpny-rod',title:'Trpný rod (Passive Voice)',
            content:'<h3>📖 Trpný rod</h3><p>Trpný rod (passive voice) používáme, když je důležitější akce než kdo ji vykonal. Tvoření: be + past participle (3. tvar).</p><p><strong>Časy v trpném rodě:</strong> Present Simple: The book is read. Past Simple: The book was read. Present Perfect: The book has been read. Future: The book will be read. Modální slovesa: The book must be read.</p><p><strong>Převod činného rod→trpný:</strong> Active: Shakespeare wrote Hamlet. Passive: Hamlet was written by Shakespeare. Původce děje se uvádí s by.</p><p><strong>Použití:</strong> (1) původce není znám: My car was stolen. (2) původce je zřejmý: The criminal was arrested. (3) formální texty, věda, média: It is believed that...</p>',
            quiz:[
              {q:'Trpný rod tvoříme:',a:'be + 3. tvar',b:'have + 3. tvar',c:'be + -ing',d:'will + be'},
              {q:'Hamlet ___ by Shakespeare.',a:'was written',b:'wrote',c:'has written',d:'is writing'},
              {q:'My car ___ yesterday.',a:'was stolen',b:'stole',c:'is stolen',d:'has stolen'},
              {q:'It ___ that... (formální)',a:'is believed',b:'believes',c:'is believing',d:'has believed'},
              {q:'The book ___ read (must).',a:'must be',b:'must',c:'must have',d:'must being'}
            ]},
          {id:'frazova-slovesa',title:'Frázová slovesa',
            content:'<h3>📖 Frázová slovesa</h3><p>Frázová slovesa (phrasal verbs) jsou slovesa + předložka/příslovce. Jejich význam se často liší od základního slovesa.</p><p><strong>Nejčastější:</strong> get up (vstát), give up (vzdát), look for (hledat), look after (starat se), turn on/off (zapnout/vypnout), put on/take off (obléknout/svléknout), come back (vrátit se), go out (jít ven), find out (zjistit), run out of (dojít zásoba).</p><p><strong>Dělení:</strong> oddělitelná (The music is loud. Turn it off. = předmět mezi) a neoddělitelná (I\'m looking for my keys. = předmět až za).</p><p>Významy: break down (porouchat se), bring up (vychovat), carry on (pokračovat), come across (narazit na), cut off (přerušit), deal with (zabývat se), get along (vycházet s).</p>',
            quiz:[
              {q:'Get up znamená:',a:'Vstát',b:'Vzdát',c:'Hledat',d:'Starat se'},
              {q:'Look for znamená:',a:'Hledat',b:'Dívat se',c:'Starat se',d:'Čekat'},
              {q:'Oddělitelné frázové sloveso:',a:'Turn off the TV / Turn it off',b:'Look for my keys',c:'Get along with',d:'Come across'},
              {q:'Give up znamená:',a:'Vzdát se',b:'Dát pryč',c:'Rozdat',d:'Přijmout'},
              {q:'Run out of znamená:',a:'Dojít (zásoba)',b:'Vyběhnout',c:'Uteci',d:'Vyčerpat'}
            ]},
          {id:'predminuly-cas',title:'Předminulý čas (Past Perfect)',
            content:'<h3>📖 Past Perfect</h3><p><strong>Past Perfect</strong> (předminulý čas) vyjadřuje děj, který se stal před jiným dějem v minulosti. Tvoření: had + past participle (3. tvar).</p><p><strong>Použití:</strong> (1) děj před jiným minulým dějem: When I arrived, she had already left. (2) s after, before, until, already, just, never. (3) v třetím kondicionálu: If I had known, I would have helped.</p><p>Past Perfect vs Past Simple: I had eaten before she arrived (jedl jsem před jejím příchodem) × I ate when she arrived (jedl jsem v momentě jejího příchodu).</p><p>Časová souslednost: Když je hlavní věta v minulosti, děj před ní je v předminulém čase. She said (Past) that she had seen (Past Perfect) the movie.</p>',
            quiz:[
              {q:'Past Perfect tvoříme:',a:'had + 3. tvar',b:'have + 3. tvar',c:'was + -ing',d:'had + -ed'},
              {q:'She had already left ___ I arrived.',a:'when',b:'after',c:'before',d:'while'},
              {q:'Past Perfect vyjadřuje:',a:'Děj před jiným minulým dějem',b:'Právě probíhající děj',c:'Budoucí děj',d:'Opakovaný děj'},
              {q:'He said he ___ (never/see) that film.',a:'had never seen',b:'never saw',c:'has never seen',d:'never sees'},
              {q:'I ___ (eat) before she came.',a:'had eaten',b:'ate',c:'was eating',d:'have eaten'}
            ]}
        ]},
      4:{
        title:'4. ročník',description:'Have something done, nepřímá řeč, maturitní témata',
        topics:[
          {id:'have-something-done',title:'Have something done',
            content:'<h3>📖 Have something done</h3><p><strong>Have something done</strong> (nechat si něco udělat) používáme, když někdo jiný vykoná službu pro nás. Tvoření: have + object + past participle.</p><p>I cut my hair (sám si stříhám) × I have my hair cut (nechávám si stříhat u kadeřníka). I repair my car (sám) × I have my car repaired (v servisu).</p><p>Časování: have se mění podle času. Present: I have my car washed. Past: I had my car washed. Future: I will have my car washed. With modals: I must have my car washed.</p><p>Get something done – neformální varianta: I need to get my phone fixed.</p>',
            quiz:[
              {q:'Have something done znamená:',a:'Nechat si něco udělat',b:'Mít něco hotové',c:'Udělat si sám',d:'Chtít něco'},
              {q:'I ___ my hair cut yesterday.',a:'had',b:'have',c:'will have',d:'having'},
              {q:'Rozdíl: I cut my hair × I have my hair cut',a:'Sám × nechám si stříhat',b:'Teď × potom',c:'Dlouhé × krátké',d:'Jednou × pravidelně'},
              {q:'Neformální varianta: I ___ my car washed.',a:'got',b:'had',c:'have',d:'made'},
              {q:'Future: I ___ my house painted.',a:'will have',b:'have',c:'had',d:'am having'}
            ]},
          {id:'neprima-rec',title:'Nepřímá řeč (Reported Speech)',
            content:'<h3>📖 Nepřímá řeč</h3><p>Nepřímá řeč (reported/indirect speech) používáme, když sdělujeme, co někdo řekl, aniž bychom citovali doslovně.</p><p><strong>Posuny časů (backshift):</strong> present→past: "I like it." → He said he liked it. past→past perfect: "I saw it." → He said he had seen it. present perfect→past perfect: "I have done it." → He said he had done it. will→would: "I will come." → He said he would come.</p><p><strong>Změny slov:</strong> today→that day, here→there, now→then, this→that, tomorrow→the next day, yesterday→the previous day, ago→before.</p><p><strong>Otázky v nepřímé řeči:</strong> Oznamovací: whether/if. Tázací: slovosled jako oznamovací věta: "Are you ready?" → He asked if I was ready. "Where is it?" → He asked where it was.</p>',
            quiz:[
              {q:'Ve větě "He said he liked it" původní znění?',a:'"I like it"',b:'"I liked it"',c:'"I have liked it"',d:'"I will like it"'},
              {q:'Převod will →',a:'would',b:'had',c:'was',d:'will be'},
              {q:'Today v nepřímé řeči:',a:'that day',b:'now',c:'yesterday',d:'then'},
              {q:'Otázka: He asked if I ___ ready.',a:'was',b:'am',c:'have been',d:'will be'},
              {q:'"I have done it" → He said he ___ it.',a:'had done',b:'has done',c:'did',d:'does'}
            ]},
          {id:'slozene-vety',title:'Složené věty a spojovací výrazy',
            content:'<h3>📖 Složené věty</h3><p><strong>Vztažné věty (relative clauses):</strong> who (lidé), which (věci), that (lidé i věci), whose (čí), where (kde), when (kdy). Defining clauses (nutné k identifikaci – bez čárky): The man who lives next door is a doctor. Non-defining clauses (doplňující info – s čárkou): My brother, who lives in Prague, is a doctor.</p><p><strong>Spojovací výrazy:</strong> although/though (ačkoli), in spite of/despite (navzdory), because (protože), so (takže), therefore (proto), however (nicméně), moreover (kromě toho), furthermore (dále), consequently (následkem), as a result (v důsledku).</p><p><strong>Účelové věty:</strong> to + infinitiv (I went there to see him), so that (I\'ll leave early so that I catch the train).</p>',
            quiz:[
              {q:'Who se používá pro:',a:'Lidi',b:'Věci',c:'Zvířata',d:'Místa'},
              {q:'Non-defining clause je:',a:'S čárkou, doplňující info',b:'Bez čárky, nutná k identifikaci',c:'Vždy na začátku',d:'Jen s that'},
              {q:'Although znamená:',a:'Ačkoli',b:'Protože',c:'Takže',d:'Nicméně'},
              {q:'The man ___ lives next door is a doctor.',a:'who',b:'which',c:'what',d:'whose'},
              {q:'Účel: I went there ___ see him.',a:'to',b:'for',c:'so that',d:'because'}
            ]},
          {id:'maturitni-temata-konverzace',title:'Maturitní témata a konverzace',
            content:'<h3>📖 Maturitní témata</h3><p>U maturitní zkoušky z angličtiny jsou obvykle tato konverzační témata:</p><p><strong>Osobní:</strong> My family, My free time, My daily routine, My school, My hobbies, My future plans. Důležité: umět o sobě mluvit souvisle 3-5 minut, popsat svoji rodinu, školu, plány do budoucna.</p><p><strong>Společenská:</strong> Housing, Food and eating habits, Shopping and services, Health and lifestyle, Travelling and transport, Weather and seasons, Sports, Culture (film, music, books).</p><p><strong>Odborná:</strong> Mass media (TV, internet, social media), Communication technology, Environmental protection, Global issues, Czech Republic, Prague, English-speaking countries (UK, USA, Canada, Australia).</p><p><strong>Tipy:</strong> Používej rozmanitou slovní zásobu, spojovací výrazy, frázová slovesa, idiomy. Trénuj před zrcadlem. Nahraj si svůj projev a poslouchej.</p>',
            quiz:[
              {q:'Jak dlouhý má být souvislý projev u maturity?',a:'3–5 minut',b:'1–2 minuty',c:'10 minut',d:'30 sekund'},
              {q:'Která fráze je vhodná pro vyjádření názoru?',a:'In my opinion...',b:'Yesterday...',c:'Because...',d:'For example...'},
              {q:'Překlad: "životní prostředí"',a:'Environment',b:'Lifestyle',c:'Surroundings',d:'Housing'},
              {q:'Která země není English-speaking?',a:'France',b:'Canada',c:'Australia',d:'UK'},
              {q:'Pro navazování použij:',a:'Moreover, what is more',b:'Yesterday, then',c:'Good, bad',d:'Yes, no'}
            ]}
        ]}
    }
  },
  'fyzika': {
    name:'Fyzika',icon:'⚡',description:'Mechanika, elektřina, optika, termika a jaderná fyzika',
    years:{
      1:{
        title:'1. ročník',description:'Mechanika – kinematika, dynamika, gravitace, kapaliny',
        topics:[
          {id:'mechanika-kinematika',title:'Mechanika – kinematika',
            content:'<h3>📖 Kinematika</h3><p>Kinematika popisuje pohyb těles bez ohledu na příčiny pohybu. <strong>Rovnoměrný pohyb:</strong> v = s/t, dráha s = v·t. Rychlost je konstantní, zrychlení a = 0. <strong>Rovnoměrně zrychlený pohyb:</strong> a = (v−v₀)/t, v = v₀ + at, s = v₀t + ½at². Volný pád: v = gt, s = ½gt², g = 9,81 m/s².</p><p><strong>Pohyb po kružnici:</strong> úhlová rychlost ω = 2π/T, obvodová rychlost v = ω·r. Dostředivé zrychlení a_d = v²/r = ω²·r. Perioda T = 1/f, frekvence f = 1/T. Jednotky: metr, sekunda, m/s, m/s².</p><p><strong>Grafické znázornění:</strong> graf s(t) – přímka (rovnoměrný) nebo parabola (zrychlený). Graf v(t) – přímka, sklon = zrychlení. Plocha pod grafem v(t) = dráha.</p>',
            quiz:[
              {q:'Rovnoměrný pohyb: v =',a:'s/t',b:'a·t',c:'v₀+at',d:'½at²'},
              {q:'Volný pád: g =',a:'9,81 m/s²',b:'10 m/s',c:'9,81 m/s',d:'1 m/s²'},
              {q:'Dráha rovnoměrně zrychleného pohybu (v₀=0):',a:'s = ½at²',b:'s = v·t',c:'s = at',d:'s = vt²'},
              {q:'Perioda a frekvence:',a:'T = 1/f',b:'T = f',c:'T = 2πf',d:'T = f²'},
              {q:'Dostředivé zrychlení a_d =',a:'v²/r',b:'v/r',c:'ω·r',d:'v·r'}
            ]},
          {id:'mechanika-dynamika',title:'Mechanika – dynamika',
            content:'<h3>📖 Dynamika</h3><p>Dynamika zkoumá příčiny pohybu – síly.</p><p><strong>Newtonovy pohybové zákony:</strong> 1. Zákon setrvačnosti – těleso setrvává v klidu nebo rovnoměrném pohybu, dokud není nuceno změnit svůj stav působením síly. 2. Zákon síly – F = m·a (síla = hmotnost × zrychlení). 3. Zákon akce a reakce – síly vzájemného působení jsou stejně velké a opačného směru.</p><p><strong>Hybnost:</strong> p = m·v. Impuls síly: I = F·Δt = Δp. Zákon zachování hybnosti: m₁v₁ + m₂v₂ = konst.</p><p><strong>Tření:</strong> F_t = μ·F_N (smykové tření), μ je součinitel tření. Třecí síla působí proti směru pohybu.</p><p><strong>Dostředivá síla:</strong> F_d = m·v²/r = m·ω²·r.</p>',
            quiz:[
              {q:'2. Newtonův zákon: F =',a:'m·a',b:'m·v',c:'m·g',d:'m/s²'},
              {q:'Hybnost p =',a:'m·v',b:'m·a',c:'F·t',d:'m·g'},
              {q:'3. zákon: akce =',a:'−reakce',b:'reakce',c:'2·reakce',d:'0'},
              {q:'Smykové tření F_t =',a:'μ·F_N',b:'m·g',c:'F/a',d:'μ·m'},
              {q:'Dostředivá síla F_d =',a:'m·v²/r',b:'m·v/r',c:'m·ω·r',d:'v²/r'}
            ]},
          {id:'mechanika-gravitace',title:'Mechanika – gravitace',
            content:'<h3>📖 Gravitace</h3><p>Newtonův gravitační zákon: F = G·(m₁·m₂)/r², kde G = 6,67·10⁻¹¹ N·m²/kg². Každá dvě tělesa se přitahují silou úměrnou součinu jejich hmotností a nepřímo úměrnou druhé mocnině jejich vzdálenosti.</p><p><strong>Tíhová síla:</strong> F_g = m·g. Tíhové zrychlení g = 9,81 m/s², na Měsíci g≈1,6 m/s². Tíha je gravitační síla působící na těleso.</p><p><strong>Pohyb v gravitačním poli:</strong> Volný pád, svislý vrh vzhůru, vodorovný vrh, šikmý vrh. <strong>Kruhová rychlost:</strong> v_k = √(G·M/r) – pro obíhání planety. 1. kosmická rychlost ≈ 7,9 km/s. 2. kosmická rychlost ≈ 11,2 km/s.</p>',
            quiz:[
              {q:'Gravitační konstanta G =',a:'6,67·10⁻¹¹',b:'9,81',c:'3·10⁸',d:'1,6·10⁻¹⁹'},
              {q:'Gravitační síla je nepřímo úměrná:',a:'r²',b:'r',c:'√r',d:'1/r'},
              {q:'1. kosmická rychlost:',a:'7,9 km/s',b:'11,2 km/s',c:'300 000 km/s',d:'9,81 m/s²'},
              {q:'Tíhové zrychlení na Zemi:',a:'9,81 m/s²',b:'6,67 m/s²',c:'1,6 m/s²',d:'10 m/s²'},
              {q:'Tíhová síla F_g =',a:'m·g',b:'m·a',c:'m·v',d:'G·m₁·m₂/r²'}
            ]},
          {id:'mechanika-kapaliny-plyny',title:'Mechanika kapalin a plynů',
            content:'<h3>📖 Mechanika kapalin a plynů</h3><p><strong>Pascalův zákon:</strong> Tlak v kapalině se šíří do všech směrů stejně. p = F/S. Hydraulické zařízení: F₁/S₁ = F₂/S₂.</p><p><strong>Hydrostatický tlak:</strong> p_h = ρ·g·h (závisí na hloubce a hustotě kapaliny). Hydrostatická síla: F = p·S. <strong>Archimédův zákon:</strong> Těleso ponořené do kapaliny je nadlehčováno silou F_vz = ρ·V·g (ρ hustota kapaliny, V objem ponořené části). Těleso plave, pokud ρ_tělesa < ρ_kapaliny.</p><p><strong>Proudění kapalin:</strong> Rovnice kontinuity: S₁·v₁ = S₂·v₂. Bernoulliho rovnice: ½ρv² + ρgh + p = konst. Viskozita – vnitřní tření kapalin.</p><p><strong>Atmosférický tlak:</strong> p_a = 101 325 Pa = 1 atm. Měření: barometr, manometr.</p>',
            quiz:[
              {q:'Hydrostatický tlak p_h =',a:'ρ·g·h',b:'F/S',c:'ρ·V·g',d:'m·g'},
              {q:'Archimédův zákon: F_vz =',a:'ρ·V·g',b:'m·g',c:'ρ·g·h',d:'F/S'},
              {q:'Pascalův zákon:',a:'Tlak se šíří všemi směry stejně',b:'Tlak závisí na hloubce',c:'Tlak je nulový',d:'Tlak roste s teplotou'},
              {q:'Rovnice kontinuity:',a:'S₁·v₁ = S₂·v₂',b:'S₁·v₂ = S₂·v₁',c:'v₁·v₂ = S₁·S₂',d:'S₁+S₂ = v₁+v₂'},
              {q:'Atmosférický tlak:',a:'101 325 Pa',b:'100 000 Pa',c:'9,81 Pa',d:'1 000 Pa'}
            ]}
        ]},
      2:{
        title:'2. ročník',description:'Molekulová fyzika, termika, termodynamika',
        topics:[
          {id:'molekulova-fyzika-termika',title:'Molekulová fyzika a termika',
            content:'<h3>📖 Molekulová fyzika a termika</h3><p>Látky se skládají z částic (atomů, molekul), které jsou v neustálém neuspořádaném pohybu.</p><p><strong>Teplota:</strong> Celsiova t [°C] a termodynamická T [K]. T = t + 273,15. Kelvinova stupnice má absolutní nulu 0 K = −273,15°C. Teplota je mírou střední kinetické energie částic.</p><p><strong>Teplo Q:</strong> Q = m·c·Δt (m hmotnost, c měrná tepelná kapacita, Δt změna teploty). Jednotka J (joule). Kalorimetrická rovnice: Q_odevzdané = Q_přijaté.</p><p><strong>Změny skupenství:</strong> tání (Q = m·l_t), tuhnutí, vypařování (Q = m·l_v), kondenzace, sublimace, desublimace. Skupenské teplo tání l_t, skupenské teplo varu l_v.</p>',
            quiz:[
              {q:'Převod °C na K:',a:'T = t + 273,15',b:'T = t − 273,15',c:'T = t·273,15',d:'T = 273,15/t'},
              {q:'Absolutní nula je:',a:'−273,15°C',b:'0°C',c:'−100°C',d:'273,15°C'},
              {q:'Teplo Q =',a:'m·c·Δt',b:'m·c/Δt',c:'c·Δt/m',d:'m·Δt/c'},
              {q:'Skupenské teplo tání:',a:'Q = m·l_t',b:'Q = m·c·Δt',c:'Q = m·l_v',d:'Q = p·V'},
              {q:'Měrná tepelná kapacita c – jednotka:',a:'J/(kg·°C)',b:'J/kg',c:'J/°C',d:'J·kg/°C'}

          {id:'struktura-vlastnosti-plynu',title:'Struktura a vlastnosti plynů',
            content:'<h3>📖 Struktura a vlastnosti plynů</h3><p><strong>Ideální plyn:</strong> zanedbáváme vlastní objem částic a vzájemné působení. Stavová rovnice: p·V = n·R·T, kde n je látkové množství, R = 8,31 J/(mol·K) – univerzální plynová konstanta.</p><p><strong>Děje s ideálním plynem:</strong> izotermický (T=konst, p·V=konst – Boyle-Mariottův zákon), izobarický (p=konst, V/T=konst – Gay-Lussacův zákon), izochorický (V=konst, p/T=konst – Charlesův zákon), adiabatický (Q=0).</p><p><strong>Kinetická teorie plynů:</strong> tlak plynu je způsoben nárazy molekul na stěny nádoby. Střední kvadratická rychlost: v_k = √(3RT/M).</p>',
            quiz:[
              {q:'Stavová rovnice ideálního plynu:',a:'p·V = n·R·T',b:'p·V = R·T',c:'p·V = m·R·T',d:'p/T = n·R·V'},
              {q:'Plynová konstanta R =',a:'8,31 J/(mol·K)',b:'6,67·10⁻¹¹',c:'9,81',d:'3·10⁸'},
              {q:'Boyle-Mariottův zákon:',a:'p·V = konst (při T=konst)',b:'V/T = konst (při p=konst)',c:'p/T = konst (při V=konst)',d:'p·V = n·R·T'},
              {q:'Izobarický děj:',a:'p=konst, V/T=konst',b:'T=konst, p·V=konst',c:'V=konst, p/T=konst',d:'Q=0'},
              {q:'Látkové množství n – jednotka:',a:'mol',b:'kg',c:'m³',d:'K'}
            ]},
          {id:'struktura-vlastnosti-pevnych-latek',title:'Struktura a vlastnosti pevných látek',
            content:'<h3>📖 Struktura a vlastnosti pevných látek</h3><p>Pevné látky mají pevný tvar a objem. Dělí se na krystalické (pravidelná struktura – NaCl, diamant, kovy) a amorfní (neuspořádané – sklo, vosk, asfalt).</p><p><strong>Krystalická mřížka:</strong> kovalentní (diamant), iontová (NaCl), kovová (kovy), molekulová (led). Poruchy krystalové mřížky: vakance, intersticiály, dislokace.</p><p><strong>Deformace pevných látek:</strong> pružná (Hookův zákon: σ = E·ε, kde σ je napětí, ε poměrná deformace, E Youngův modul pružnosti) a plastická (trvalá deformace).</p><p><strong>Teplotní roztažnost:</strong> ∆l = l₀·α·∆t (délková), ∆V = V₀·β·∆t (objemová). α – součinitel délkové roztažnosti.</p>',
            quiz:[
              {q:'Hookův zákon: σ =',a:'E·ε',b:'m·a',c:'F/S',d:'E/ε'},
              {q:'Youngův modul pružnosti E:',a:'σ/ε',b:'ε/σ',c:'σ·ε',d:'F·S'},
              {q:'Teplotní délková roztažnost:',a:'∆l = l₀·α·∆t',b:'∆l = l₀/α·∆t',c:'∆l = α·∆t',d:'∆l = l₀·α/∆t'},
              {q:'Příklad amorfní látky:',a:'Sklo',b:'Diamant',c:'NaCl',d:'Měď'},
              {q:'Plastická deformace je:',a:'Trvalá',b:'Vratná',c:'Pružná',d:'Okamžitá'}
            ]},
          {id:'termodynamika',title:'Termodynamika',
            content:'<h3>📖 Termodynamika</h3><p>Termodynamika se zabývá přeměnou tepla v práci a naopak.</p><p><strong>1. termodynamický zákon (zákon zachování energie):</strong> ∆U = Q + W (změna vnitřní energie = teplo dodané soustavě + práce vykonaná na soustavě). U izolované soustavy: Q + W = 0.</p><p><strong>2. termodynamický zákon:</strong> Teplo nemůže samovolně přecházet z chladnějšího tělesa na teplejší. Tepelná účinnost η = (W/Q₁)·100% = (T₁−T₂)/T₁·100%. Carnotův cyklus – ideální tepelný stroj.</p><p><strong>Entropie:</strong> míra neuspořádanosti soustavy. ∆S = Q/T. Ve všech dějích entropie roste nebo zůstává konstantní.</p>',
            quiz:[
              {q:'1. termodynamický zákon:',a:'∆U = Q + W',b:'∆U = Q − W',c:'Q = ∆U + W',d:'W = Q − ∆U'},
              {q:'2. termodynamický zákon:',a:'Teplo nemůže samovolně přecházet z chladna na teplo',b:'Energie se nemůže ztratit',c:'Entropie klesá',d:'Práce = teplo'},
              {q:'Účinnost Carnotova cyklu:',a:'(T₁−T₂)/T₁',b:'(T₂−T₁)/T₁',c:'Q₁/Q₂',d:'W/Q₂'},
              {q:'Entropie v uzavřené soustavě:',a:'Roste nebo je konstantní',b:'Klesá',c:'Je nulová',d:'Mění se náhodně'},
              {q:'∆U je:',a:'Změna vnitřní energie',b:'Teplo',c:'Práce',d:'Entropie'}
            ]}
        ]},
      3:{
        title:'3. ročník',description:'Elektřina a magnetismus',
        topics:[
          {id:'elektricky-naboj-pole',title:'Elektrický náboj a pole',
            content:'<h3>📖 Elektrický náboj a pole</h3><p><strong>Elektrický náboj:</strong> Q, jednotka C (coulomb). Náboj je kvantován – elementární náboj e = 1,602·10⁻¹⁹ C. Zákon zachování elektrického náboje: celkový náboj v izolované soustavě je konstantní.</p><p>Coulombův zákon: F = k·(Q₁·Q₂)/r², kde k = 1/(4πε₀) = 9·10⁹ N·m²/C², ε₀ = 8,85·10⁻¹² F/m (permitivita vakua).</p><p><strong>Elektrické pole:</strong> intenzita E = F/Q₀ (v homogenním poli E = U/d). Potenciál φ, napětí U = φ₁−φ₂. Práce v elektrickém poli: W = Q·U.</p><p><strong>Kapacita:</strong> C = Q/U, jednotka F (farad). Deskový kondenzátor: C = ε·S/d. Spojování: sériově 1/C = 1/C₁+1/C₂, paralelně C = C₁+C₂.</p>',
            quiz:[
              {q:'Elementární náboj e =',a:'1,602·10⁻¹⁹ C',b:'1,6·10⁻¹⁸ C',c:'9,11·10⁻³¹ C',d:'6,67·10⁻¹¹ C'},
              {q:'Coulombův zákon: F =',a:'k·Q₁Q₂/r²',b:'k·Q₁Q₂/r',c:'k·Q₁Q₂·r²',d:'k/r²·Q₁Q₂'},
              {q:'Elektrická intenzita E =',a:'F/Q',b:'Q·U',c:'U/d',d:'F·Q'},
              {q:'Kapacita C =',a:'Q/U',b:'U/Q',c:'Q·U',d:'Q²/U'},
              {q:'Permitivita vakua ε₀ =',a:'8,85·10⁻¹² F/m',b:'9·10⁹ F/m',c:'1,6·10⁻¹⁹ F/m',d:'4π·10⁻⁷ F/m'}
            ]},
          {id:'elektricky-proud',title:'Elektrický proud',
            content:'<h3>📖 Elektrický proud</h3><p><strong>Elektrický proud I</strong> je usměrněný pohyb volných částic s nábojem. I = Q/t, jednotka A (ampér). Ohmov zákon: I = U/R (proud je přímo úměrný napětí a nepřímo úměrný odporu).</p><p><strong>Elektrický odpor R</strong> – závisí na materiálu, délce a průřezu: R = ρ·l/S (ρ rezistivita). Jednotka Ω (ohm). Závislost na teplotě: R = R₀(1 + α·Δt).</p><p><strong>Výkon el. proudu:</strong> P = U·I = I²·R = U²/R, jednotka W (watt). Práce: W = P·t = U·I·t.</p><p><strong>Zapojení rezistorů:</strong> sériově: R = R₁+R₂+..., paralelně: 1/R = 1/R₁+1/R₂+...</p>',
            quiz:[
              {q:'Ohmův zákon:',a:'I = U/R',b:'U = I·R',c:'R = U/I',d:'Všechny uvedené'},
              {q:'Elektrický odpor R =',a:'ρ·l/S',b:'ρ·S/l',c:'S/(ρ·l)',d:'l·S/ρ'},
              {q:'Výkon P =',a:'U·I',b:'U/I',c:'I/U',d:'U²·I'},
              {q:'Sériové zapojení rezistorů:',a:'R = R₁+R₂+...',b:'1/R = 1/R₁+1/R₂+...',c:'R = R₁·R₂/(R₁+R₂)',d:'R = 1/(R₁+R₂+...)'},
              {q:'Práce el. proudu W =',a:'U·I·t',b:'U·I/t',c:'I·t/U',d:'P/t'}
            ]},
          {id:'magneticke-pole',title:'Magnetické pole',
            content:'<h3>📖 Magnetické pole</h3><p>Magnetické pole vzniká kolem pohybujících se nábojů (vodičů s proudem) a permanentních magnetů. Magnetická indukce B, jednotka T (tesla).</p><p><strong>Lorentzova síla:</strong> F_m = Q·v·B·sin α (na pohybující se náboj), F_m = B·I·l·sin α (na vodič s proudem). Směr dle Flemingova pravidla levé ruky.</p><p><strong>Magnetické pole cívky:</strong> B = μ₀·N·I/l (solenoid), μ₀ = 4π·10⁻⁷ H/m (permeabilita vakua). Magnetický indukční tok: Φ = B·S·cos α.</p><p><strong>Elektromagnetická indukce (Faradayův zákon):</strong> U_i = −ΔΦ/Δt. Lenzův zákon: indukovaný proud působí proti změně, která ho vyvolala.</p>',
            quiz:[
              {q:'Lorentzova síla na vodič s proudem:',a:'F = B·I·l·sin α',b:'F = B·Q·v·sin α',c:'F = B·I·l',d:'F = Q·v·B'},
              {q:'Permeabilita vakua μ₀ =',a:'4π·10⁻⁷ H/m',b:'8,85·10⁻¹² H/m',c:'9·10⁹ H/m',d:'6,67·10⁻¹¹ H/m'},
              {q:'Faradayův indukční zákon:',a:'U_i = −ΔΦ/Δt',b:'U_i = −ΔB/Δt',c:'U_i = B·l·v',d:'U_i = ΔΦ·Δt'},
              {q:'Lenzův zákon:',a:'Indukovaný proud působí proti změně',b:'Proud je úměrný napětí',c:'Síla je úměrná zrychlení',d:'Energie se zachovává'},
              {q:'Jednotka magnetické indukce:',a:'T (tesla)',b:'Wb (weber)',c:'H (henry)',d:'Vs'}
            ]},
          {id:'stridavy-proud',title:'Střídavý proud',
            content:'<h3>📖 Střídavý proud</h3><p>Střídavý proud mění periodicky svůj směr i velikost. Okamžitá hodnota: u = Uₘ·sin(ωt), i = Iₘ·sin(ωt + φ). ω = 2πf – úhlová frekvence. f = 50 Hz (ČR).</p><p><strong>Efektivní hodnoty:</strong> U_ef = Uₘ/√2, I_ef = Iₘ/√2. Standardní napětí v zásuvce u nás je 230 V (efektivní), amplituda ≈ 325 V.</p><p><strong>Obvody střídavého proudu:</strong> R – rezistance (R), C – kapacitance (X_C = 1/(ωC)), L – induktance (X_L = ωL). Impedance Z = √(R² + (X_L−X_C)²). Výkon: P = U·I·cos φ (činný výkon).</p><p><strong>Třífázový proud:</strong> tři napětí posunuta o 120°, Y a Δ zapojení. <strong>Transformátor:</strong> U₁/U₂ = N₁/N₂, přenos energie bez změny frekvence.</p>',
            quiz:[
              {q:'Frekvence sítě v ČR:',a:'50 Hz',b:'60 Hz',c:'100 Hz',d:'230 Hz'},
              {q:'Efektivní napětí U_ef =',a:'Uₘ/√2',b:'Uₘ·√2',c:'Uₘ/2',d:'2·Uₘ'},
              {q:'Napětí v zásuvce (ef.):',a:'230 V',b:'325 V',c:'400 V',d:'110 V'},
              {q:'Induktance cívky X_L =',a:'ωL',b:'1/(ωC)',c:'ωC',d:'L/ω'},
              {q:'Transformátor: U₁/U₂ =',a:'N₁/N₂',b:'N₂/N₁',c:'I₁/I₂',d:'R₁/R₂'}
            ]}
        ]},
      4:{
        title:'4. ročník',description:'Optika, atomová a jaderná fyzika',
        topics:[
          {id:'optika-paprskova',title:'Optika – paprsková',
            content:'<h3>📖 Optika – paprsková</h3><p>Optika studuje světlo a jeho šíření. Rychlost světla c = 3·10⁸ m/s ve vakuu. Index lomu n = c/v (v je rychlost v látce).</p><p><strong>Odraz světla:</strong> zákon odrazu: α\' = α (úhel odrazu = úhel dopadu). Zrcadla: rovinná (zdánlivý obraz), dutá (skutečný nebo zdánlivý), vypuklá (vždy zdánlivý).</p><p><strong>Lom světla (Snellův zákon):</strong> n₁·sin α = n₂·sin β. Při přechodu z opticky hustšího do řidšího prostředí může nastat totální reflex (α > α_m).</p><p><strong>Čočky:</strong> spojka (kladná ohnisková vzdálenost) – obraz skutečný nebo zdánlivý. Rozptylka (záporná) – vždy zdánlivý. Zobrazovací rovnice: 1/a + 1/a\' = 1/f. Optická mohutnost φ = 1/f, jednotka D (dioptrie).</p>',
            quiz:[
              {q:'Rychlost světla ve vakuu:',a:'3·10⁸ m/s',b:'3·10⁶ m/s',c:'300 000 m/s',d:'9·10⁸ m/s'},
              {q:'Snellův zákon lomu:',a:'n₁·sin α = n₂·sin β',b:'n₁·n₂ = sin α·sin β',c:'sin α/sin β = n₂/n₁',d:'n₁·sin β = n₂·sin α'},
              {q:'Index lomu n =',a:'c/v',b:'v/c',c:'c·v',d:'λ·f'},
              {q:'Optická mohutnost φ =',a:'1/f',b:'f',c:'−1/f',d:'f²'},
              {q:'Totální reflexe nastává při přechodu:',a:'Z hustší do řidší',b:'Z řidší do hustší',c:'V homogenním prostředí',d:'Ve vakuu'}
            ]},
          {id:'optika-vlnova',title:'Optika – vlnová',
            content:'<h3>📖 Optika – vlnová</h3><p>Světlo je elektromagnetické vlnění. Vlnová délka λ = c/f. Barva světla je dána frekvencí (vlnovou délkou). Viditelné spektrum: 380–780 nm.</p><p><strong>Interference světla:</strong> skládání vlnění – zesílení (konstruktivní) nebo zeslabení (destruktivní). Youngův pokus (dvě štěrbiny).</p><p><strong>Difrakce (ohyb):</strong> ohýbání světla na překážce. Mřížka: d·sin α = k·λ (d mřížková konstanta, k řád maxima).</p><p><strong>Polarizace světla:</strong> usměrnění kmitů světelného vlnění do jednoho směru. Polarizátor, analyzátor. Metody polarizace: odrazem, lomem, polaroidy.</p><p><strong>Elektromagnetické záření:</strong> rádiové vlny, mikrovlny, infračervené, viditelné, UV, rentgenové, gama. Liší se vlnovou délkou a frekvencí.</p>',
            quiz:[
              {q:'Viditelné spektrum:',a:'380–780 nm',b:'200–600 nm',c:'1–1000 nm',d:'500–1000 nm'},
              {q:'λ =',a:'c/f',b:'f/c',c:'c·f',d:'f·T'},
              {q:'Youngův pokus dokazuje:',a:'Interferenci světla',b:'Lom světla',c:'Odraz světla',d:'Polarizaci'},
              {q:'Difrakční mřížka: d·sin α =',a:'k·λ',b:'λ/k',c:'k/λ',d:'d·λ'},
              {q:'UV záření má kratší λ než:',a:'Viditelné světlo',b:'Rentgenové',c:'Gama',d:'Mikrovlny'}
            ]},
          {id:'atomova-fyzika',title:'Atomová fyzika',
            content:'<h3>📖 Atomová fyzika</h3><p><strong>Atom:</strong> jádro (protony + neutrony) + elektronový obal. Protonové číslo Z, nukleonové číslo A. Hmotnostní defekt – rozdíl mezi hmotností jádra a součtem hmotností nukleonů.</p><p><strong>Bohrův model atomu:</strong> elektrony obíhají po diskrétních drahách (slupkách K, L, M, N...). Energie kvantována: E_n = −13,6/n² eV. Při přechodu elektronu mezi hladinami foton: h·f = E₂−E₁. Planckova konstanta h = 6,626·10⁻³⁴ J·s.</p><p><strong>Fotoelektrický jev:</strong> uvolnění elektronů z kovu působením světla. Einstein: E_f = h·f. Výstupní práce W_v. h·f = W_v + ½mv².</p><p><strong>Lasery:</strong> stimulovaná emise záření. Vlastnosti: koherentní, monochromatické, úzký svazek. Typy: plynové (He-Ne), polovodičové, pevnolátkové.</p>',
            quiz:[
              {q:'Planckova konstanta h =',a:'6,626·10⁻³⁴ J·s',b:'1,602·10⁻¹⁹ J·s',c:'9,11·10⁻³¹ J·s',d:'3·10⁸ J·s'},
              {q:'Energie fotonu E =',a:'h·f',b:'h·c/λ',c:'h/λ',d:'h·c'},
              {q:'Bohr: E_n =',a:'−13,6/n² eV',b:'−13,6·n² eV',c:'13,6/n eV',d:'−n²/13,6 eV'},
              {q:'Fotoelektrický jev – kdo vysvětlil?',a:'Einstein',b:'Planck',c:'Bohr',d:'Rutherford'},
              {q:'Laser produkuje:',a:'Monochromatické koherentní světlo',b:'Bílé světlo',c:'Polarizované světlo',d:'Rentgenové záření'}
            ]},
          {id:'jaderna-fyzika',title:'Jaderná fyzika',
            content:'<h3>📖 Jaderná fyzika</h3><p><strong>Radioaktivita:</strong> samovolná přeměna jader. Druhy záření: α (jádro He), β (elektron/pozitron), γ (foton). Poločas přeměny T – doba, za kterou se přemění polovina jader: N = N₀·(1/2)^(t/T).</p><p><strong>Jaderné reakce:</strong> štěpení (U-235 + n → štěpné produkty + 2-3 n + energie), syntéza/fúze (H + H → He + energie – probíhá na Slunci).</p><p><strong>Jaderný reaktor:</strong> moderátor (zpomaluje neutrony), chladivo, regulační tyče (absorbují neutrony), palivo (U-235, Pu-239). Typy: tlakovodní (PWR/WER), varné (BWR), těžkovodní (CANDU).</p><p><strong>Využití:</strong> energetika (jaderné elektrárny – Temelín, Dukovany), medicína (ozařování, PET, SPECT), archeologie (C-14 datování), průmysl (defektoskopie).</p>',
            quiz:[
              {q:'Poločas přeměny: N = N₀·(1/2)^(t/T) – co je T?',a:'Poločas přeměny',b:'Doba rozpadu',c:'Celková doba',d:'Konstanta'},
              {q:'Záření α je:',a:'Jádro helia',b:'Elektron',c:'Foton',d:'Neutron'},

          {id:'obecna-chemie-atom',title:'Obecná chemie – atom',
            content:'<h3>📖 Stavba atomu</h3><p>Atom je nejmenší částice prvku zachovávající jeho chemické vlastnosti. Skládá se z <strong>jádra</strong> (protony p⁺ + neutrony n⁰) a <strong>elektronového obalu</strong> (elektrony e⁻). Protonové číslo Z = počet protonů, nukleonové číslo A = protony + neutrony, počet neutronů = A − Z.</p><p><strong>Elektronový obal:</strong> elektrony jsou rozmístěny v energetických hladinách (slupkách K, L, M, N...). Maximální počet elektronů ve slupce: 2n². Valenční elektrony – v poslední slupce, rozhodují o chemických vlastnostech.</p><p><strong>Izotopy:</strong> atomy stejného prvku s různým počtem neutronů (např. ¹H, ²H deuterium, ³H tritium). <strong>Ionty:</strong> kationty (+) – odtržením e⁻, anionty (−) – přijetím e⁻.</p><p><strong>Radioaktivita:</strong> samovolná přeměna jader nestabilních izotopů (viz jaderná fyzika).</p>',
